<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKU WISE SALES Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;padding:12px;min-height:100vh}
h1{text-align:center;color:#39ff14;font-size:20px;margin-bottom:4px;letter-spacing:1px}
.sub{text-align:center;color:#666;font-size:11px;margin-bottom:12px}
.loading{text-align:center;padding:80px;color:#4fc3f7;font-size:18px}
.spin{display:inline-block;width:30px;height:30px;border:3px solid #333;border-top:3px solid #4fc3f7;border-radius:50%;animation:sp .8s linear infinite;margin-bottom:10px}
@keyframes sp{to{transform:rotate(360deg)}}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:12px}
.cd{background:#16213e;border-radius:10px;padding:10px;text-align:center;border-left:4px solid #4fc3f7;transition:.2s}
.cd:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,.3)}
.cd.g{border-left-color:#39ff14}.cd.o{border-left-color:#e09f3e}.cd.r{border-left-color:#dc2f02}.cd.p{border-left-color:#a855f7}
.cd .lb{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.cd .vl{font-size:20px;font-weight:700;color:#fff}

/* Filters */
.fbox{background:#16213e;border-radius:10px;padding:12px;margin-bottom:12px}
.fbox h3{color:#4fc3f7;font-size:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.frow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.frow select{background:#0f1a2e;color:#eee;border:1px solid #333;border-radius:6px;padding:5px 8px;font-size:11px;min-width:110px;max-width:160px}
.frow select:focus{border-color:#4fc3f7;outline:none}
.fbtn{background:#39ff14;color:#1a1a2e;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
.fbtn:hover{background:#2ed810}
.fbtn.ref{background:#e09f3e}.fbtn.ref:hover{background:#c88a2e}
.fbtn.clr{background:#dc2f02}.fbtn.clr:hover{background:#b02602}
.fbtn.dl{background:#4fc3f7}.fbtn.dl:hover{background:#3ab0e0}

/* Charts */
.chs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.chb{background:#16213e;border-radius:10px;padding:12px}
.chb h3{color:#4fc3f7;font-size:11px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.chb canvas{max-height:240px}

/* Table */
.tbox{background:#16213e;border-radius:10px;padding:12px;margin-bottom:12px}
.tbox h3{color:#4fc3f7;font-size:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center}
.tbox h3 span{color:#888;font-size:11px;font-weight:400}
.twrap{overflow-x:auto;max-height:500px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap}
th{background:#0f3460;color:#4fc3f7;padding:6px 8px;text-align:left;position:sticky;top:0;z-index:2;cursor:default;user-select:none}
th.sortable{cursor:pointer}
th.sortable:hover{background:#1a4a80;color:#39ff14}
th .arrow{margin-left:4px;font-size:10px;color:#39ff14}
td{padding:5px 8px;border-bottom:1px solid #1a1a2e}
tr:nth-child(even) td{background:#0f1a2e}
tr:hover td{background:#1f2b47}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.bg{background:#39ff1422;color:#39ff14}
.br{background:#dc2f0222;color:#dc2f02}
.zero{color:#dc2f02;font-weight:700}
td a{color:#4fc3f7;text-decoration:none}
td a:hover{text-decoration:underline;color:#39ff14}

/* Pagination */
.pag{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:10px}
.pag button{background:#0f3460;color:#4fc3f7;border:1px solid #333;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
.pag button:hover{background:#1a4a80}
.pag button:disabled{opacity:.3;cursor:default}
.pag span{color:#888;font-size:12px}

/* Search */
.srch{background:#0f1a2e;color:#eee;border:1px solid #333;border-radius:6px;padding:6px 10px;font-size:12px;width:200px}
.srch:focus{border-color:#4fc3f7;outline:none}

.ft{text-align:center;color:#444;font-size:10px;margin-top:8px}
@media(max-width:768px){.chs{grid-template-columns:1fr}.cards{grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}}
</style>
</head>
<body>

<h1>SKU WISE SALES DASHBOARD</h1>
<div class="sub" id="info">Loading...</div>
<div id="loader" class="loading"><div class="spin"></div><br>Loading dashboard data...<br><span style="font-size:13px;color:#888">This may take 15-20 seconds</span></div>
<div id="app" style="display:none">

<!-- Cards -->
<div class="cards" id="cards"></div>

<!-- Filters -->
<div class="fbox">
<h3>Filters</h3>
<div class="frow" id="filterRow">
  <input class="srch" id="searchBox" placeholder="Search anything..." oninput="applyAll()">
  <button class="fbtn" onclick="applyAll()">Apply</button>
  <button class="fbtn clr" onclick="clearFilters()">Clear</button>
  <button class="fbtn ref" onclick="loadData()">Refresh</button>
  <button class="fbtn dl" onclick="downloadCSV()">Download CSV</button>
</div>
</div>

<!-- Charts -->
<div class="chs">
  <div class="chb"><h3>Sales by Period</h3><canvas id="ch1"></canvas></div>
  <div class="chb"><h3>Stock Status</h3><canvas id="ch2"></canvas></div>
</div>
<div class="chs">
  <div class="chb"><h3>Platform Wise 30-Day Sales</h3><canvas id="ch3"></canvas></div>
  <div class="chb"><h3>Active / Inactive</h3><canvas id="ch4"></canvas></div>
</div>

<!-- Table -->
<div class="tbox">
<h3>All SKU Data <span id="tcount"></span></h3>
<div class="twrap">
  <table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table>
</div>
<div class="pag">
  <button id="prevBtn" onclick="changePage(-1)">&lt; Prev</button>
  <span id="pageInfo">Page 1</span>
  <button id="nextBtn" onclick="changePage(1)">Next &gt;</button>
  <select id="ppSelect" onchange="changePageSize()" style="background:#0f1a2e;color:#eee;border:1px solid #333;border-radius:6px;padding:4px;font-size:11px">
    <option value="50">50/page</option>
    <option value="100" selected>100/page</option>
    <option value="200">200/page</option>
    <option value="500">500/page</option>
  </select>
</div>
</div>

<div class="ft" id="lastUp"></div>
</div>

<script>
// ========================================================
var API_URL = 'https://script.google.com/macros/s/AKfycby-O40MaoS8hea5zTGsb1eMtUWJt_e8TkNG0SDYa6kuvwou7ELAEnHGWXJTGJUDX8maUw/exec';
// ========================================================

var ALL_DATA=[], HEADERS=[], FILTERED=[], SORT_COL=-1, SORT_DIR=1, PAGE=0, PER_PAGE=100;
var STOCK_COL=12, ACTIVE_COL=13;
var SORTABLE_FROM=15;
var CHS={};
// Columns that contain ratings (0-based) — will detect dynamically
var RATING_COLS=[];

function loadData(){
  document.getElementById('loader').style.display='block';
  document.getElementById('app').style.display='none';
  fetch(API_URL,{redirect:'follow'})
    .then(function(r){return r.json()})
    .then(function(d){
      if(d.error){onErr(d.error);return;}
      ALL_DATA=d.rows||[];
      HEADERS=d.headers||[];
      detectRatingCols();
      document.getElementById('loader').style.display='none';
      document.getElementById('app').style.display='block';
      buildColumnFilters();
      applyAll();
      document.getElementById('lastUp').textContent='Updated: '+new Date().toLocaleString();
      document.getElementById('info').textContent=ALL_DATA.length+' SKUs | '+HEADERS.length+' columns';
    })
    .catch(function(e){onErr(e.message||'Network error')});
}

function onErr(msg){document.getElementById('loader').innerHTML='<div style="color:#dc2f02">Error: '+msg+'</div>';}

// Detect rating columns (headers containing "RATING" or "STAR")
function detectRatingCols(){
  RATING_COLS=[];
  for(var i=0;i<HEADERS.length;i++){
    var h=String(HEADERS[i]||'').toUpperCase();
    if(h.indexOf('RATING')>=0||h.indexOf('STAR')>=0||h.indexOf('REVIEW')>=0){
      RATING_COLS.push(i);
    }
  }
}

// ===== BUILD FILTERS FOR EVERY COLUMN =====
function buildColumnFilters(){
  var colSets=[];
  for(var c=0;c<HEADERS.length;c++){
    var hdr=String(HEADERS[c]||'').trim();
    if(!hdr){colSets.push(null);continue;}
    var isNumeric=true;
    var vals={};
    var uniqueCount=0;
    for(var r=0;r<ALL_DATA.length&&r<1000;r++){
      var v=String(ALL_DATA[r][c]||'').trim();
      if(v===''||v==='0') continue;
      if(isNaN(Number(v))) isNumeric=false;
      if(!vals[v]){vals[v]=1;uniqueCount++;}
    }
    if(isNumeric && uniqueCount>20){colSets.push(null);continue;}
    if(uniqueCount>200){colSets.push(null);continue;}
    var allVals={};
    for(var r=0;r<ALL_DATA.length;r++){
      var v=String(ALL_DATA[r][c]||'').trim();
      if(v) allVals[v]=1;
    }
    colSets.push(Object.keys(allVals).sort());
  }

  var frow=document.getElementById('filterRow');
  var oldFilters=frow.querySelectorAll('.col-filter');
  for(var i=0;i<oldFilters.length;i++) frow.removeChild(oldFilters[i]);

  var searchBox=document.getElementById('searchBox');
  for(var c=0;c<colSets.length;c++){
    if(!colSets[c]) continue;
    var sel=document.createElement('select');
    sel.className='col-filter';
    sel.setAttribute('data-col',c);
    sel.style.cssText='background:#0f1a2e;color:#eee;border:1px solid #333;border-radius:6px;padding:5px 8px;font-size:11px;min-width:110px;max-width:160px';
    var hdr=String(HEADERS[c]||'').trim().toUpperCase();
    sel.innerHTML='<option value="">'+hdr+'</option>';
    var items=colSets[c];
    for(var i=0;i<items.length;i++){
      sel.innerHTML+='<option value="'+items[i].replace(/"/g,'&quot;')+'">'+items[i]+'</option>';
    }
    sel.onchange=applyAll;
    frow.insertBefore(sel,searchBox);
  }
}

function clearFilters(){
  var sels=document.querySelectorAll('.col-filter');
  for(var i=0;i<sels.length;i++) sels[i].value='';
  document.getElementById('searchBox').value='';
  SORT_COL=-1;SORT_DIR=1;
  applyAll();
}

// ===== APPLY ALL FILTERS + SORT =====
function applyAll(){
  var activeFilters=[];
  var sels=document.querySelectorAll('.col-filter');
  for(var i=0;i<sels.length;i++){
    var val=sels[i].value;
    if(val) activeFilters.push({col:parseInt(sels[i].getAttribute('data-col')),val:val.toUpperCase()});
  }
  var sq=document.getElementById('searchBox').value.trim().toUpperCase();

  FILTERED=[];
  for(var i=0;i<ALL_DATA.length;i++){
    var r=ALL_DATA[i];
    var pass=true;
    for(var f=0;f<activeFilters.length;f++){
      if(String(r[activeFilters[f].col]||'').trim().toUpperCase()!==activeFilters[f].val){pass=false;break;}
    }
    if(!pass) continue;
    if(sq){
      var found=false;
      for(var j=0;j<r.length;j++){if(String(r[j]||'').toUpperCase().indexOf(sq)>=0){found=true;break;}}
      if(!found) continue;
    }
    FILTERED.push(r);
  }

  if(SORT_COL>=0){
    FILTERED.sort(function(a,b){
      var va=a[SORT_COL],vb=b[SORT_COL];
      var na=parseFloat(va),nb=parseFloat(vb);
      if(!isNaN(na)&&!isNaN(nb)) return (na-nb)*SORT_DIR;
      va=String(va||'').toUpperCase();vb=String(vb||'').toUpperCase();
      if(va<vb)return -1*SORT_DIR;if(va>vb)return 1*SORT_DIR;return 0;
    });
  }

  PAGE=0;
  renderCards();
  renderCharts();
  renderTable();
}

function sortBy(col){
  if(SORT_COL===col){SORT_DIR*=-1;}
  else{SORT_COL=col;SORT_DIR=1;}
  applyAll();
}

// ===== CARDS =====
function renderCards(){
  var d=FILTERED,tdy=0,d3=0,d7=0,d15=0,d30=0,ins=0,oos=0,act=0,inact=0;
  var ci=getSalesIndexes();
  for(var i=0;i<d.length;i++){
    var r=d[i];
    tdy+=Number(r[ci.today])||0;
    d3+=Number(r[ci.day3])||0;
    d7+=Number(r[ci.day7])||0;
    d15+=Number(r[ci.day15])||0;
    d30+=Number(r[ci.day30])||0;
    var st=String(r[STOCK_COL]||'').trim().toUpperCase();
    var ac=String(r[ACTIVE_COL]||'').trim().toUpperCase();
    if(st==='IN STOCK')ins++;else oos++;
    if(ac==='INACTIVE')inact++;else act++;
  }
  var h='';
  // Row 1: Total SKUs + Sales data
  h+=mkcd('Total SKUs',fmt(d.length),'');
  h+=mkcd('Today Sales',fmt(tdy),'g');
  h+=mkcd('3-Day Sales',fmt(d3),'g');
  h+=mkcd('7-Day Sales',fmt(d7),'o');
  h+=mkcd('15-Day Sales',fmt(d15),'o');
  h+=mkcd('30-Day Sales',fmt(d30),'p');
  // Row 2: Stock + Active (below sales)
  h+=mkcd('In Stock',fmt(ins),'g');
  h+=mkcd('Out of Stock',fmt(oos),'r');
  h+=mkcd('Active',fmt(act),'g');
  h+=mkcd('Inactive',fmt(inact),'r');
  document.getElementById('cards').innerHTML=h;
}

function mkcd(l,v,c){return'<div class="cd '+c+'"><div class="lb">'+l+'</div><div class="vl">'+v+'</div></div>'}
function fmt(n){return n==null?'0':Number(n).toLocaleString('en-IN')}

function getSalesIndexes(){
  var ci={today:-1,day3:-1,day7:-1,day15:-1,day30:-1};
  for(var i=0;i<HEADERS.length;i++){
    var h=String(HEADERS[i]||'').toUpperCase().trim();
    if(h.indexOf('1 DAY')>=0||h.indexOf('TODAY')>=0)ci.today=i;
    else if(h.indexOf('3 DAY')>=0)ci.day3=i;
    else if(h.indexOf('7 DAY')>=0)ci.day7=i;
    else if(h.indexOf('15 DAY')>=0)ci.day15=i;
    else if(h.indexOf('30 DAY')>=0)ci.day30=i;
  }
  if(ci.today<0){var n=HEADERS.length;ci.today=n-5;ci.day3=n-4;ci.day7=n-3;ci.day15=n-2;ci.day30=n-1;}
  return ci;
}

// ===== CHARTS =====
function renderCharts(){
  var ci=getSalesIndexes();
  var tdy=0,d3=0,d7=0,d15=0,d30=0;
  var platMap={},stockMap={},actCount=0,inactCount=0;
  for(var i=0;i<FILTERED.length;i++){
    var r=FILTERED[i];
    tdy+=Number(r[ci.today])||0;d3+=Number(r[ci.day3])||0;d7+=Number(r[ci.day7])||0;d15+=Number(r[ci.day15])||0;d30+=Number(r[ci.day30])||0;
    var pl=String(r[1]||'').trim();
    var st=String(r[STOCK_COL]||'').trim();
    var ac=String(r[ACTIVE_COL]||'').trim().toUpperCase();
    if(pl){if(!platMap[pl])platMap[pl]=0;platMap[pl]+=Number(r[ci.day30])||0;}
    if(!stockMap[st])stockMap[st]=0;stockMap[st]++;
    if(ac==='INACTIVE')inactCount++;else actCount++;
  }

  dc('ch1');CHS.ch1=new Chart(document.getElementById('ch1'),{type:'bar',data:{labels:['Today','3 Day','7 Day','15 Day','30 Day'],datasets:[{data:[tdy,d3,d7,d15,d30],backgroundColor:['#39ff14','#4fc3f7','#e09f3e','#a855f7','#dc2f02'],borderRadius:5}]},options:bOpts()});

  var sl=[],sv=[],sc=['#39ff14','#dc2f02','#e09f3e','#4fc3f7','#a855f7'];
  for(var k in stockMap){sl.push(k||'BLANK');sv.push(stockMap[k]);}
  dc('ch2');CHS.ch2=new Chart(document.getElementById('ch2'),{type:'doughnut',data:{labels:sl,datasets:[{data:sv,backgroundColor:sc.slice(0,sl.length),borderWidth:0}]},options:pOpts()});

  var platArr=[];for(var k in platMap)platArr.push({n:k,v:platMap[k]});
  platArr.sort(function(a,b){return b.v-a.v});
  var pl=[],pv=[],pc=['#4fc3f7','#39ff14','#e09f3e','#a855f7','#dc2f02','#f72585','#7209b7','#3a0ca3','#4361ee','#4cc9f0'];
  for(var i=0;i<platArr.length;i++){pl.push(platArr[i].n);pv.push(platArr[i].v);}
  dc('ch3');CHS.ch3=new Chart(document.getElementById('ch3'),{type:'bar',data:{labels:pl,datasets:[{data:pv,backgroundColor:pc.slice(0,pl.length),borderRadius:5}]},options:bOpts()});

  dc('ch4');CHS.ch4=new Chart(document.getElementById('ch4'),{type:'doughnut',data:{labels:['Active','Inactive'],datasets:[{data:[actCount,inactCount],backgroundColor:['#39ff14','#dc2f02'],borderWidth:0}]},options:pOpts()});
}

function bOpts(){return{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888',font:{size:10}},grid:{color:'#222'}},y:{ticks:{color:'#888',font:{size:10}},grid:{color:'#222'}}}}}
function pOpts(){return{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#eee',padding:10,font:{size:10}}}}}}
function dc(id){if(CHS[id]){CHS[id].destroy();CHS[id]=null;}}

// ===== CHECK IF VALUE IS A URL =====
function isUrl(v){
  var s=String(v||'').trim();
  return s.indexOf('http://')===0||s.indexOf('https://')===0||s.indexOf('www.')===0;
}

function makeLink(v){
  var s=String(v||'').trim();
  var href=s;
  if(s.indexOf('www.')===0) href='https://'+s;
  // Shorten display text
  var display=s.replace(/^https?:\/\//,'').replace(/^www\./,'');
  if(display.length>30) display=display.substring(0,30)+'...';
  return '<a href="'+href+'" target="_blank" rel="noopener">'+display+'</a>';
}

// ===== CHECK IF VALUE SHOULD BE RED =====
function isRedValue(val, colIdx){
  var v=val;
  var num=parseFloat(v);

  // 0 or empty in numeric columns (P onwards = index 15+)
  if(colIdx>=SORTABLE_FROM){
    if(v===0||v==='0'||v===''||v===null||v===undefined) return true;
  }

  // Ratings below 3.5
  if(RATING_COLS.indexOf(colIdx)>=0){
    if(!isNaN(num) && num<3.5 && num>=0) return true;
  }

  return false;
}

// ===== TABLE =====
function renderTable(){
  PER_PAGE=parseInt(document.getElementById('ppSelect').value)||100;
  var th='';
  for(var i=0;i<HEADERS.length;i++){
    var isSortable=i>=SORTABLE_FROM;
    var arrow='';
    if(SORT_COL===i) arrow='<span class="arrow">'+(SORT_DIR===1?'\u25B2':'\u25BC')+'</span>';
    if(isSortable){
      th+='<th class="sortable" onclick="sortBy('+i+')">'+HEADERS[i]+arrow+'</th>';
    }else{
      th+='<th>'+HEADERS[i]+'</th>';
    }
  }
  document.getElementById('thead').innerHTML=th;

  var start=PAGE*PER_PAGE;
  var end=Math.min(start+PER_PAGE,FILTERED.length);
  var totalPages=Math.ceil(FILTERED.length/PER_PAGE)||1;
  var tb='';
  for(var i=start;i<end;i++){
    var r=FILTERED[i];
    tb+='<tr>';
    for(var j=0;j<r.length;j++){
      var val=r[j];
      var cellClass='';
      var cellContent='';

      // Badge for Stock column
      if(j===STOCK_COL){
        var su=String(val||'').trim().toUpperCase();
        cellContent=su==='IN STOCK'?'<span class="badge bg">IN STOCK</span>':'<span class="badge br">'+val+'</span>';
      }
      // Badge for Active column
      else if(j===ACTIVE_COL){
        var au=String(val||'').trim().toUpperCase();
        cellContent=au==='INACTIVE'?'<span class="badge br">INACTIVE</span>':'<

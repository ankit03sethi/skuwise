<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKU WISE SALES Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;padding:12px;min-height:100vh;overflow-x:hidden}
.header-row{display:flex;justify-content:center;align-items:center;position:relative;margin-bottom:4px}
h1{text-align:center;color:#39ff14;font-size:20px;letter-spacing:1px}
.global-search-wrap{position:absolute;right:0;top:50%;transform:translateY(-50%)}
.global-search{background:#0f1a2e;color:#eee;border:1px solid #333;border-radius:8px;padding:8px 14px;font-size:13px;width:280px;transition:border-color .2s}
.global-search:focus{border-color:#39ff14;outline:none;box-shadow:0 0 8px rgba(57,255,20,.3)}
.global-search::placeholder{color:#555}
.sub{text-align:center;color:#888;font-size:11px;margin-bottom:12px}
.loading{text-align:center;padding:80px;color:#4fc3f7;font-size:18px}
.spin{display:inline-block;width:30px;height:30px;border:3px solid #333;border-top:3px solid #4fc3f7;border-radius:50%;animation:sp .8s linear infinite;margin-bottom:10px}
@keyframes sp{to{transform:rotate(360deg)}}
.section-title{color:#4fc3f7;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;padding-left:4px;font-weight:600}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:10px}
.cd{background:#16213e;border-radius:10px;padding:10px;text-align:center;border-left:4px solid #4fc3f7;transition:.2s;cursor:pointer}
.cd:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(79,195,247,.3);border-left-color:#fff}
.cd.g{border-left-color:#39ff14}.cd.o{border-left-color:#e09f3e}.cd.r{border-left-color:#dc2f02}.cd.p{border-left-color:#a855f7}.cd.b{border-left-color:#4fc3f7}.cd.pk{border-left-color:#f72585}
.cd .lb{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.5px}
.cd .vl{font-size:20px;font-weight:700;color:#fff}
.fbox{background:#16213e;border-radius:10px;padding:12px;margin-bottom:12px}
.fbox h3{color:#4fc3f7;font-size:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.frow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.frow select{background:#0f1a2e;color:#eee;border:1px solid #333;border-radius:6px;padding:5px 8px;font-size:11px;min-width:110px;max-width:160px}
.frow select:focus{border-color:#4fc3f7;outline:none}
.fbtn{background:#39ff14;color:#1a1a2e;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
.fbtn:hover{background:#2ed810}
.fbtn.ref{background:#e09f3e}.fbtn.ref:hover{background:#c88a2e}
.fbtn.clr{background:#dc2f02}.fbtn.clr:hover{background:#b02602}
.fbtn.dl{background:#4fc3f7}.fbtn.dl:hover{background:#3ab0e0}
.chs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.chb{background:#16213e;border-radius:10px;padding:12px}
.chb h3{color:#4fc3f7;font-size:11px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.chb canvas{max-height:240px}
.tbox{background:#16213e;border-radius:10px;padding:12px;margin-bottom:12px;position:relative}
.tbox h3{color:#4fc3f7;font-size:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center}
.tbox h3 span{color:#888;font-size:11px;font-weight:400}
.twrap{overflow-x:auto;overflow-y:auto;max-height:500px;width:100%}
table{border-collapse:collapse;font-size:11px;white-space:nowrap;min-width:100%}
th{background:#0f3460;color:#4fc3f7;padding:6px 8px;text-align:left;position:sticky;top:0;z-index:2;cursor:default;user-select:none}
th.sortable{cursor:pointer}
th.sortable:hover{background:#1a4a80;color:#39ff14}
th .arrow{margin-left:4px;font-size:10px;color:#39ff14}
td{padding:5px 8px;border-bottom:1px solid #1a1a2e}
tr:nth-child(even) td{background:#0f1a2e}
tr:hover td{background:#1f2b47}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600}
.bg{background:#39ff1422;color:#39ff14}
.br{background:#dc2f0222;color:#dc2f02}
.zero{color:#dc2f02;font-weight:700}
td a{color:#4fc3f7;text-decoration:none}
td a:hover{text-decoration:underline;color:#39ff14}
.pag{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:10px}
.pag button{background:#0f3460;color:#4fc3f7;border:1px solid #333;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
.pag button:hover{background:#1a4a80}
.pag button:disabled{opacity:.3;cursor:default}
.pag span{color:#888;font-size:12px}
.srch{background:#0f1a2e;color:#eee;border:1px solid #333;border-radius:6px;padding:6px 10px;font-size:12px;width:200px}
.srch:focus{border-color:#4fc3f7;outline:none}
.ft{text-align:center;color:#444;font-size:10px;margin-top:8px}
@media(max-width:768px){.chs{grid-template-columns:1fr}.cards{grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}.global-search{width:160px;font-size:11px;padding:6px 10px}}

/* CUSTOM NUMERIC DROPDOWN */
.num-dd-wrap{position:relative;display:inline-block}
.num-dd-btn{background:#0f1a2e;color:#eee;border:1px solid #333;border-radius:6px;padding:5px 8px;font-size:11px;min-width:110px;max-width:160px;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.num-dd-btn:hover{border-color:#4fc3f7}
.num-dd-btn .dd-arrow{margin-left:4px;font-size:8px;color:#888}
.num-dd-btn.active-filter{border-color:#39ff14;color:#39ff14}
.num-dd-panel{display:none;position:absolute;top:100%;left:0;z-index:50;background:#0f1a2e;border:1px solid #4fc3f7;border-radius:8px;width:200px;padding:6px;margin-top:4px;box-shadow:0 8px 24px rgba(0,0,0,.6)}
.num-dd-panel.show{display:block}
.num-dd-search{width:100%;background:#1a1a2e;color:#eee;border:1px solid #333;border-radius:5px;padding:5px 8px;font-size:11px;margin-bottom:4px}
.num-dd-search:focus{border-color:#4fc3f7;outline:none}
.num-dd-search::placeholder{color:#555}
.num-dd-sort{display:flex;flex-direction:column;gap:2px;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid #333}
.num-dd-sort-item{padding:5px 8px;font-size:11px;color:#eee;cursor:pointer;border-radius:4px;transition:.15s}
.num-dd-sort-item:hover{background:#16213e;color:#4fc3f7}
.num-dd-sort-item.selected{background:#39ff1422;color:#39ff14;font-weight:600}
.num-dd-vals{max-height:180px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#333 #0f1a2e}
.num-dd-vals::-webkit-scrollbar{width:5px}
.num-dd-vals::-webkit-scrollbar-track{background:#0f1a2e}
.num-dd-vals::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
.num-dd-val-item{padding:4px 8px;font-size:11px;color:#ccc;cursor:pointer;border-radius:4px;transition:.15s}
.num-dd-val-item:hover{background:#16213e;color:#4fc3f7}
.num-dd-val-item.selected{background:#4fc3f722;color:#4fc3f7;font-weight:600}
.num-dd-clear{width:100%;background:#dc2f02;color:#fff;border:none;border-radius:4px;padding:4px;font-size:10px;font-weight:600;cursor:pointer;margin-top:4px}
.num-dd-clear:hover{background:#ff4444}

/* MODAL STYLES */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:100;overflow-y:auto;padding:20px}
.modal-overlay.show{display:block}
.modal-box{background:#1a1a2e;border:1px solid #333;border-radius:12px;max-width:1200px;margin:0 auto;padding:20px;position:relative;min-height:300px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #333}
.modal-title{color:#39ff14;font-size:16px;font-weight:700}
.modal-close{background:#dc2f02;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer}
.modal-close:hover{background:#ff4444}
.modal-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.modal-back{background:#4fc3f7;color:#1a1a2e;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
.modal-back:hover{background:#39ff14}
.modal-bread{color:#888;font-size:12px}
.modal-bread span{color:#4fc3f7;font-weight:600}
.drill-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.drill-item{background:#16213e;border-radius:10px;padding:14px;text-align:center;border-left:4px solid #4fc3f7;cursor:pointer;transition:.2s}
.drill-item:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(79,195,247,.3);border-left-color:#39ff14}
.drill-item .di-name{font-size:12px;color:#eee;font-weight:600;margin-bottom:4px}
.drill-item .di-count{font-size:22px;font-weight:700;color:#39ff14}
.modal-toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.m-tbox{background:#16213e;border-radius:10px;padding:12px;position:relative}
.m-tbox h3{color:#4fc3f7;font-size:12px;margin-bottom:8px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.m-tbox h3 span{color:#888;font-size:11px;font-weight:400}
.m-twrap{overflow-x:auto;overflow-y:auto;max-height:400px;width:100%}
.m-pag{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:10px}
.m-pag button{background:#0f3460;color:#4fc3f7;border:1px solid #333;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
.m-pag button:hover{background:#1a4a80}
.m-pag button:disabled{opacity:.3;cursor:default}
.m-pag span{color:#888;font-size:12px}
</style>
</head>
<body>
<div class="header-row">
  <h1>SKU WISE SALES DASHBOARD</h1>
  <div class="global-search-wrap">
    <input class="global-search" id="globalSearch" placeholder="Search anything across all SKUs..." oninput="globalSearchHandler()">
  </div>
</div>
<div class="sub" id="info">SKU WISE SALES</div>
<div id="loader" class="loading"><div class="spin"></div><br>Loading dashboard data...<br><span style="font-size:13px;color:#888">This may take 15-20 seconds</span></div>
<div id="app" style="display:none">

<!-- CARDS ROW 1: SALES -->
<div class="section-title">SALES</div>
<div class="cards" id="salesCards"></div>

<!-- CARDS ROW 2: STATUS -->
<div class="section-title">STATUS</div>
<div class="cards" id="statusCards"></div>

<!-- CARDS ROW 3: ACTION -->
<div class="section-title">ACTION REQUIRED</div>
<div class="cards" id="actionCards"></div>

<!-- FILTERS -->
<div class="fbox">
<h3>Filters</h3>
<div class="frow" id="filterRow">
  <input class="srch" id="searchBox" placeholder="Search anything..." oninput="applyAll()">
  <button class="fbtn" onclick="applyAll()">Apply</button>
  <button class="fbtn clr" onclick="clearFilters()">Clear</button>
  <button class="fbtn ref" onclick="loadData()">Refresh</button>
  <button class="fbtn dl" onclick="downloadMainCSV()">Download CSV</button>
</div>
</div>

<!-- CHARTS -->
<div class="chs">
  <div class="chb"><h3>Sales by Period</h3><canvas id="ch1"></canvas></div>
  <div class="chb"><h3>Stock Status</h3><canvas id="ch2"></canvas></div>
</div>
<div class="chs">
  <div class="chb"><h3>Platform Wise 30-Day Sales</h3><canvas id="ch3"></canvas></div>
  <div class="chb"><h3>Active / Inactive</h3><canvas id="ch4"></canvas></div>
</div>

<!-- MAIN TABLE -->
<div class="tbox">
<h3>All SKU Data <span id="tcount"></span></h3>
<div class="twrap">
  <table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table>
</div>
<div class="pag">
  <button id="prevBtn" onclick="changePage(-1)">&#60; Prev</button>
  <span id="pageInfo">Page 1</span>
  <button id="nextBtn" onclick="changePage(1)">Next &#62;</button>
  <select id="ppSelect" onchange="changePageSize()" style="background:#0f1a2e;color:#eee;border:1px solid #333;border-radius:6px;padding:4px;font-size:11px">
    <option value="50">50/page</option>
    <option value="100" selected>100/page</option>
    <option value="200">200/page</option>
    <option value="500">500/page</option>
  </select>
</div>
</div>
<div class="ft" id="lastUp"></div>
</div>

<!-- DRILL-DOWN MODAL -->
<div class="modal-overlay" id="modalOverlay">
<div class="modal-box">
  <div class="modal-header">
    <div class="modal-title" id="modalTitle">Drill Down</div>
    <button class="modal-close" onclick="closeModal()">X CLOSE</button>
  </div>
  <div class="modal-nav" id="modalNav" style="display:none">
    <button class="modal-back" id="modalBackBtn" onclick="modalGoBack()">&#9664; Back</button>
    <div class="modal-bread" id="modalBread"></div>
  </div>
  <div id="modalContent"></div>
</div>
</div>

<!-- GLOBAL SEARCH RESULTS PANEL -->
<div id="globalResultsPanel" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:90;overflow-y:auto;padding:20px">
<div style="background:#1a1a2e;border:1px solid #333;border-radius:12px;max-width:1400px;margin:0 auto;padding:20px;position:relative">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #333">
    <div style="color:#39ff14;font-size:16px;font-weight:700" id="gResTitle">Search Results</div>
    <button class="modal-close" onclick="closeGlobalSearch()">X CLOSE</button>
  </div>
  <div id="gResContent"></div>
</div>
</div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycbwwILh7WaqCvWftUSvDwbcUHwyREoETo_7lxIlrSG3ZOE1QFtthlU-VvJLZLfH4inGZ0g/exec';
var ALL_DATA=[],HEADERS=[],FILTERED=[],SORT_COL=-1,SORT_DIR=1,PAGE=0,PER_PAGE=100;
var STOCK_COL=12,ACTIVE_COL=13,PLATFORM_COL=1,COMPANY_COL=2;
var SORTABLE_FROM=15;
var CHS={};
var RATING_COLS=[];
var NUMERIC_COLS=[];
var NUMERIC_UNIQUE_VALS={};

// Numeric dropdown state
var numDDState={};

// Modal state
var M={level:0,type:'',label:'',platform:'',filtered:[],skuList:[],skuFiltered:[],sortCol:-1,sortDir:1,page:0};

// Global search state
var G_TIMER=null,G_RESULTS=[],G_PAGE=0,G_SORT_COL=-1,G_SORT_DIR=1;

// ===== LOAD DATA =====
function loadData(){
  document.getElementById('loader').style.display='block';
  document.getElementById('app').style.display='none';
  document.getElementById('loader').innerHTML='<div class="spin"></div><br>Loading dashboard data...<br><span style="font-size:13px;color:#888">37,000+ SKUs - may take 30-60 seconds</span>';
  var controller=new AbortController();
  var timeoutId=setTimeout(function(){controller.abort();},90000);
  fetch(API_URL,{redirect:'follow',signal:controller.signal})
    .then(function(r){clearTimeout(timeoutId);if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(function(text){
      if(!text||text.trim().length===0){onErr('Empty response.');return;}
      if(text.trim().charAt(0)==='<'){onErr('API returned HTML. Deploy with access: Anyone');return;}
      try{var d=JSON.parse(text);onDataLoaded(d);}catch(e){onErr('JSON error: '+e.message);}
    })
    .catch(function(e){
      clearTimeout(timeoutId);
      onErr((e.name==='AbortError'?'Timeout.':'Fetch failed: '+e.message)+'<br><a href="'+API_URL+'" target="_blank" style="color:#4fc3f7">Test API</a>');
    });
}
function onDataLoaded(d){
  if(d.error){onErr(d.error);return;}
  ALL_DATA=d.rows||[];HEADERS=d.headers||[];
  detectRatingCols();detectNumericCols();collectNumericUniqueVals();
  document.getElementById('loader').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('lastUp').textContent='Updated: '+new Date().toLocaleString();
  document.getElementById('info').textContent='SKU WISE SALES';
  renderCards();buildColumnFilters();applyAll();
}
function onErr(msg){document.getElementById('loader').innerHTML='<div style="color:#dc2f02;font-size:14px">'+msg+'</div>';}
function fmt(n){return n==null?'0':Number(n).toLocaleString('en-IN');}

// ===== SALES INDEXES =====
function getSalesIndexes(){
  var ci={today:-1,day3:-1,day7:-1,day15:-1,day30:-1};
  for(var i=0;i<HEADERS.length;i++){
    var h=String(HEADERS[i]||'').toUpperCase().trim();
    if(h.indexOf('1 DAY')>=0||h.indexOf('TODAY')>=0)ci.today=i;
    else if(h.indexOf('3 DAY')>=0)ci.day3=i;
    else if(h.indexOf('7 DAY')>=0)ci.day7=i;
    else if(h.indexOf('15 DAY')>=0)ci.day15=i;
    else if(h.indexOf('30 DAY')>=0)ci.day30=i;
  }
  if(ci.today<0){var n=HEADERS.length;ci.today=n-5;ci.day3=n-4;ci.day7=n-3;ci.day15=n-2;ci.day30=n-1;}
  return ci;
}

// ===== CARD FILTER LOGIC =====
function filterByType(type){
  var ci=getSalesIndexes();var result=[];
  for(var i=0;i<ALL_DATA.length;i++){
    var r=ALL_DATA[i];
    var stock=String(r[STOCK_COL]||'').trim().toUpperCase();
    var active=String(r[ACTIVE_COL]||'').trim().toUpperCase();
    var activeNum=parseFloat(r[ACTIVE_COL]);
    switch(type){
      case 'total':result.push(r);break;
      case 'active':if(active!=='INACTIVE'&&active!=='0'&&active!=='')result.push(r);break;
      case 'inactive':if(active==='INACTIVE')result.push(r);break;
      case 'instock':if(stock==='IN STOCK')result.push(r);break;
      case 'outofstock':if(stock!=='IN STOCK'&&stock!=='')result.push(r);break;
      case 'today':if((Number(r[ci.today])||0)>0)result.push(r);break;
      case 'day3':if((Number(r[ci.day3])||0)>0)result.push(r);break;
      case 'day7':if((Number(r[ci.day7])||0)>0)result.push(r);break;
      case 'day15':if((Number(r[ci.day15])||0)>0)result.push(r);break;
      case 'day30':if((Number(r[ci.day30])||0)>0)result.push(r);break;
      case 'needopen':
        if(stock==='IN STOCK'&&active!=='INACTIVE'){if(activeNum===0||active==='0')result.push(r);}break;
      case 'needclose':
        if(stock!=='IN STOCK'&&stock!==''&&active!=='INACTIVE'){if(!isNaN(activeNum)&&activeNum>0)result.push(r);}break;
    }
  }
  return result;
}

// ===== RENDER CARDS =====
function renderCards(){
  var ci=getSalesIndexes();
  var tdy=0,d3=0,d7=0,d15=0,d30=0;
  for(var i=0;i<ALL_DATA.length;i++){
    tdy+=Number(ALL_DATA[i][ci.today])||0;d3+=Number(ALL_DATA[i][ci.day3])||0;
    d7+=Number(ALL_DATA[i][ci.day7])||0;d15+=Number(ALL_DATA[i][ci.day15])||0;d30+=Number(ALL_DATA[i][ci.day30])||0;
  }
  var sh='';
  sh+=mkcard('Today Sales',fmt(tdy),'g','today');
  sh+=mkcard('3-Day Sales',fmt(d3),'g','day3');
  sh+=mkcard('7-Day Sales',fmt(d7),'o','day7');
  sh+=mkcard('15-Day Sales',fmt(d15),'o','day15');
  sh+=mkcard('30-Day Sales',fmt(d30),'p','day30');
  document.getElementById('salesCards').innerHTML=sh;

  var sth='';
  sth+=mkcard('Total SKUs',fmt(ALL_DATA.length),'b','total');
  sth+=mkcard('Active',fmt(filterByType('active').length),'g','active');
  sth+=mkcard('Inactive',fmt(filterByType('inactive').length),'r','inactive');
  sth+=mkcard('In Stock',fmt(filterByType('instock').length),'g','instock');
  sth+=mkcard('Out of Stock',fmt(filterByType('outofstock').length),'r','outofstock');
  document.getElementById('statusCards').innerHTML=sth;

  var ah='';
  ah+=mkcard('Need To Open',fmt(filterByType('needopen').length),'pk','needopen');
  ah+=mkcard('Need To Close',fmt(filterByType('needclose').length),'r','needclose');
  document.getElementById('actionCards').innerHTML=ah;
}
function mkcard(label,value,cc,type){
  return '<div class="cd '+cc+'" onclick="openDrill(\''+type+'\',\''+label.replace(/'/g,"\\'")+'\')"><div class="lb">'+label+'</div><div class="vl">'+value+'</div></div>';
}

// ===== MODAL DRILL-DOWN =====
function openDrill(type,label){
  M={level:1,type:type,label:label,platform:'',filtered:filterByType(type),skuList:[],skuFiltered:[],sortCol:-1,sortDir:1,page:0};
  document.getElementById('modalTitle').textContent=label+' - Platform Breakdown';
  document.getElementById('modalNav').style.display='none';
  renderDrillPlatforms();
  document.getElementById('modalOverlay').className='modal-overlay show';
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modalOverlay').className='modal-overlay';
  document.body.style.overflow='';
}
function modalGoBack(){
  if(M.level<=1){closeModal();return;}
  if(M.level===2){M.level=1;document.getElementById('modalTitle').textContent=M.label+' - Platform Breakdown';document.getElementById('modalNav').style.display='none';renderDrillPlatforms();return;}
  if(M.level===3){M.level=2;document.getElementById('modalTitle').textContent=M.label+' - Companies';document.getElementById('modalNav').style.display='flex';document.getElementById('modalBread').innerHTML='<span>'+M.label+'</span> &rarr; <span>'+M.platform+'</span> &rarr; Companies';renderDrillCompanies();return;}
}
function groupBy(data,col){
  var map={};
  for(var i=0;i<data.length;i++){var k=String(data[i][col]||'').trim()||'(blank)';if(!map[k])map[k]=0;map[k]++;}
  var arr=[];for(var k in map)arr.push({name:k,count:map[k]});
  arr.sort(function(a,b){return b.count-a.count;});return arr;
}
function renderDrillPlatforms(){

function renderModalTable(){
  var sq=(document.getElementById('mSearch')?document.getElementById('mSearch').value:'').trim().toUpperCase();
  M.skuFiltered=[];
  for(var i=0;i<M.skuList.length;i++){
    var r=M.skuList[i];
    if(sq){var f=false;for(var j=0;j<r.length;j++){if(String(r[j]||'').toUpperCase().indexOf(sq)>=0){f=true;break;}}if(!f)continue;}

  }
  h+='</tr></thead><tbody>';
  for(var i=start;i<end;i++){
    var r=M.skuFiltered[i];h+='<tr>';
    for(var j=0;j<r.length;j++){
      var val=r[j];var cc='';var ct='';
      if(j===STOCK_COL){var su=String(val||'').trim().toUpperCase();ct=su==='IN STOCK'?'<span class="badge bg">IN STOCK</span>':'<span class="badge br">'+val+'</span>';}
      else if(j===ACTIVE_COL){var au=String(val||'').trim().toUpperCase();ct=au==='INACTIVE'?'<span class="badge br">INACTIVE</span>':'<span class="badge bg">'+val+'</span>';}
      else if(isUrl(val)){ct=makeLink(val);}

      else{ct=(val===null||val===undefined)?'':val;}

  h+='<div class="m-pag"><button onclick="mPage(-1)"'+(M.page===0?' disabled':'')+'>&#60; Prev</button>';

function downloadModalCSV(){

function detectRatingCols(){RATING_COLS=[];for(var i=0;i<HEADERS.length;i++){var h=String(HEADERS[i]||'').toUpperCase();if(h.indexOf('RATING')>=0||h.indexOf('STAR')>=0||h.indexOf('REVIEW')>=0)RATING_COLS.push(i);}}
function detectNumericCols(){NUMERIC_COLS=[];for(var c=0;c<HEADERS.length;c++){var nc=0,t=0;for(var r=0;r<ALL_DATA.length&&r<500;r++){var v=ALL_DATA[r][c];if(v===''||v===null||v===undefined)continue;t++;if(!isNaN(Number(v)))nc++;}if(t>0&&nc/t>0.7)NUMERIC_COLS.push(c);}}
function collectNumericUniqueVals(){
  NUMERIC_UNIQUE_VALS={};
  for(var ci=0;ci<NUMERIC_COLS.length;ci++){
    var c=NUMERIC_COLS[ci];var map={};
    for(var r=0;r<ALL_DATA.length;r++){
      var v=ALL_DATA[r][c];if(v===''||v===null||v===undefined)continue;
      var num=Number(v);if(!isNaN(num))map[num]=1;
    }
    var arr=Object.keys(map).map(Number);arr.sort(function(a,b){return a-b;});
    NUMERIC_UNIQUE_VALS[c]=arr;
  }
}
function buildColumnFilters(){
  var colSets=[];
  for(var c=0;c<HEADERS.length;c++){
    var hdr=String(HEADERS[c]||'').trim();if(!hdr){colSets.push(null);continue;}

    for(var r=0;r<ALL_DATA.length;r++){var v=String(ALL_DATA[r][c]||'').trim();if(v){if(!vals[v]){vals[v]=1;uc++;}}}
    if(uc>200||uc<2){colSets.push(null);continue;}
    colSets.push(Object.keys(vals).sort());
  }
  var frow=document.getElementById('filterRow');

  var sb=document.getElementById('searchBox');

    if(!colSets[c])continue;
    var hdr=String(HEADERS[c]||'').trim().toUpperCase();
    if(colSets[c]==='NUMERIC'){

        +'<div class="num-dd-sort">'
        +'<div class="num-dd-sort-item" id="numLH_'+c+'" onclick="setNumSort('+c+',\'low-high\')">Low to High</div>'
        +'<div class="num-dd-sort-item" id="numHL_'+c+'" onclick="setNumSort('+c+',\'high-low\')">High to Low</div>'
        +'</div>'
        +'<div class="num-dd-vals" id="numVals_'+c+'"></div>'
        +'<button class="num-dd-clear" onclick="clearNumDD('+c+')">Clear Filter</button>'
        +'</div>';
      frow.insertBefore(wrap,sb);
      renderNumDDList(c,'');
    } else {
      var sel=document.createElement('select');sel.className='col-filter';sel.setAttribute('data-col',c);
      sel.style.cssText='background:#0f1a2e;color:#eee;border:1px solid #333;border-radius:6px;padding:5px 8px;font-size:11px;min-width:110px;max-width:160px';
      sel.setAttribute('data-type','text');sel.innerHTML='<option value="">'+hdr+'</option>';

function toggleNumDD(col){

function closeAllNumDDs(){

function renderNumDDList(col,search){
  var vals=NUMERIC_UNIQUE_VALS[col]||[];

  for(var i=0;i<vals.length;i++){

    var selected=(numDDState[col]&&numDDState[col].exactVal!==null&&numDDState[col].exactVal===v);
    h+='<div class="num-dd-val-item'+(selected?' selected':'')+'" onclick="setNumExact('+col+','+v+')">'+vs+'</div>';
    shown++;
    if(shown>=200)break;
  }

}
function filterNumDDList(col,search){renderNumDDList(col,search);}
function setNumSort(col,dir){

  applyAll();
}
function setNumExact(col,val){
  numDDState[col].exactVal=val;numDDState[col].sort='';

  applyAll();
}
function clearNumDD(col){
  numDDState[col]={sort:'',exactVal:null};

function updateNumBtnLabel(col){
  var hdr=String(HEADERS[col]||'').trim().toUpperCase();
  var btn=document.getElementById('numBtn_'+col);
  var state=numDDState[col];
  if(state.exactVal!==null){btn.querySelector('span').textContent=hdr+': '+state.exactVal;btn.classList.add('active-filter');}
  else if(state.sort){btn.querySelector('span').textContent=hdr+' ('+(state.sort==='low-high'?'L-H':'H-L')+')';btn.classList.add('active-filter');}
  else{btn.querySelector('span').textContent=hdr;btn.classList.remove('active-filter');}
  // Update sort item highlights
  var lh=document.getElementById('numLH_'+col);
  var hl=document.getElementById('numHL_'+col);

document.addEventListener('click',function(e){

function clearFilters(){
  var sels=document.querySelectorAll('.col-filter');for(var i=0;i<sels.length;i++)sels[i].value='';
  document.getElementById('searchBox').value='';
  document.getElementById('globalSearch').value='';

    numDDState[k]={sort:'',exactVal:null};
    var s=document.getElementById('numSearch_'+k);if(s)s.value='';
    renderNumDDList(parseInt(k),'');
    updateNumBtnLabel(parseInt(k));
  }
  SORT_COL=-1;SORT_DIR=1;applyAll();
}
function applyAll(){
  var tf=[];var ns=null;var exactFilters=[];
  // Text filters
  var sels=document.querySelectorAll('.col-filter');
  for(var i=0;i<sels.length;i++){var v=sels[i].value;if(!v)continue;var col=parseInt(sels[i].getAttribute('data-col'));tf.push({col:col,val:v.toUpperCase()});}
  // Numeric dropdown filters
  for(var k in numDDState){
    var col=parseInt(k);var state=numDDState[k];
    if(state.sort){ns={col:col,dir:state.sort==='low-high'?1:-1};}
    if(state.exactVal!==null){exactFilters.push({col:col,val:state.exactVal});}
  }
  var sq=document.getElementById('searchBox').value.trim().toUpperCase();
  FILTERED=[];
  for(var i=0;i<ALL_DATA.length;i++){
    var r=ALL_DATA[i];var pass=true;
    // Text filters
    for(var f=0;f<tf.length;f++){if(String(r[tf[f].col]||'').trim().toUpperCase()!==tf[f].val){pass=false;break;}}
    if(!pass)continue;
    // Exact numeric filters
    for(var f=0;f<exactFilters.length;f++){
      var rv=Number(r[exactFilters[f].col]);
      if(isNaN(rv)||rv!==exactFilters[f].val){pass=false;break;}
    }
    if(!pass)continue;
    // Search
    if(sq){var found=false;for(var j=0;j<r.length;j++){if(String(r[j]||'').toUpperCase().indexOf(sq)>=0){found=true;break;}}if(!found)continue;}
    FILTERED.push(r);
  }
  if(ns){SORT_COL=ns.col;SORT_DIR=ns.dir;}
  if(SORT_COL>=0){FILTERED.sort(function(a,b){var va=a[SORT_COL],vb=b[SORT_COL];var na=parseFloat(va),nb=parseFloat(vb);if(isNaN(na))na=-999999;if(isNaN(nb))nb=-999999;if(!isNaN(parseFloat(va))&&!isNaN(parseFloat(vb)))return(na-nb)*SORT_DIR;va=String(va||'').toUpperCase();vb=String(vb||'').toUpperCase();return va<vb?-1*SORT_DIR:va>vb?1*SORT_DIR:0;});}
  PAGE=0;renderCharts();renderTable();
}
function sortBy(col){if(SORT_COL===col){SORT_DIR*=-1;}else{SORT_COL=col;SORT_DIR=1;}applyAll();}
function renderCharts(){
  var ci=getSalesIndexes();var tdy=0,d3=0,d7=0,d15=0,d30=0;
  var platMap={},stockMap={},actCount=0,inactCount=0;
  for(var i=0;i<FILTERED.length;i++){var r=FILTERED[i];tdy+=Number(r[ci.today])||0;d3+=Number(r[ci.day3])||0;d7+=Number(r[ci.day7])||0;d15+=Number(r[ci.day15])||0;d30+=Number(r[ci.day30])||0;
    var pl=String(r[1]||'').trim();var st=String(r[STOCK_COL]||'').trim();var ac=String(r[ACTIVE_COL]||'').trim().toUpperCase();
    if(pl){if(!platMap[pl])platMap[pl]=0;platMap[pl]+=Number(r[ci.day30])||0;}if(!stockMap[st])stockMap[st]=0;stockMap[st]++;if(ac==='INACTIVE')inactCount++;else actCount++;}
  dc('ch1');CHS.ch1=new Chart(document.getElementById('ch1'),{type:'bar',data:{labels:['Today','3 Day','7 Day','15 Day','30 Day'],datasets:[{data:[tdy,d3,d7,d15,d30],backgroundColor:['#39ff14','#4fc3f7','#e09f3e','#a855f7','#dc2f02'],borderRadius:5}]},options:bOpts()});
  var sl=[],sv=[],sc=['#39ff14','#dc2f02','#e09f3e','#4fc3f7','#a855f7'];for(var k in stockMap){sl.push(k||'BLANK');sv.push(stockMap[k]);}
  dc('ch2');CHS.ch2=new Chart(document.getElementById('ch2'),{type:'doughnut',data:{labels:sl,datasets:[{data:sv,backgroundColor:sc.slice(0,sl.length),borderWidth:0}]},options:pOpts()});
  var platArr=[];for(var k in platMap)platArr.push({n:k,v:platMap[k]});platArr.sort(function(a,b){return b.v-a.v;});
  var pl2=[],pv=[],pc=['#4fc3f7','#39ff14','#e09f3e','#a855f7','#dc2f02','#f72585','#7209b7','#3a0ca3','#4361ee','#4cc9f0'];
  for(var i=0;i<platArr.length;i++){pl2.push(platArr[i].n);pv.push(platArr[i].v);}
  dc('ch3');CHS.ch3=new Chart(document.getElementById('ch3'),{type:'bar',data:{labels:pl2,datasets:[{data:pv,backgroundColor:pc.slice(0,pl2.length),borderRadius:5}]},options:bOpts()});
  dc('ch4');CHS.ch4=new Chart(document.getElementById('ch4'),{type:'doughnut',data:{labels:['Active','Inactive'],datasets:[{data:[actCount,inactCount],backgroundColor:['#39ff14','#dc2f02'],borderWidth:0}]},options:pOpts()});
}
function bOpts(){return{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888',font:{size:10}},grid:{color:'#222'}},y:{ticks:{color:'#888',font:{size:10}},grid:{color:'#222'}}}};}
function pOpts(){return{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#eee',padding:10,font:{size:10}}}}};}
function dc(id){if(CHS[id]){CHS[id].destroy();CHS[id]=null;}}
function renderTable(){
  PER_PAGE=parseInt(document.getElementById('ppSelect').value)||100;
  var th='';for(var i=0;i<HEADERS.length;i++){var s=i>=SORTABLE_FROM;var arrow='';if(SORT_COL===i)arrow='<span class="arrow">'+(SORT_DIR===1?'\u25B2':'\u25BC')+'</span>';
    if(s){th+='<th class="sortable" onclick="sortBy('+i+')">'+HEADERS[i]+arrow+'</th>';}else{th+='<th>'+HEADERS[i]+'</th>';}}
  document.getElementById('thead').innerHTML=th;
  var start=PAGE*PER_PAGE;var end=Math.min(start+PER_PAGE,FILTERED.length);var tp=Math.ceil(FILTERED.length/PER_PAGE)||1;
  var tb='';
  for(var i=start;i<end;i++){var r=FILTERED[i];tb+='<tr>';
    for(var j=0;j<r.length;j++){var val=r[j];var cc='';var ct='';
      if(j===STOCK_COL){var su=String(val||'').trim().toUpperCase();ct=su==='IN STOCK'?'<span class="badge bg">IN STOCK</span>':'<span class="badge br">'+val+'</span>';}
      else if(j===ACTIVE_COL){var au=String(val||'').trim().toUpperCase();ct=au==='INACTIVE'?'<span class="badge br">INACTIVE</span>':'<span class="badge bg">'+val+'</span>';}
      else if(isUrl(val)){ct=makeLink(val);}
      else if(isRedVal(val,j)){cc=' class="zero"';ct=(val===''||val===null||val===undefined)?'0':val;}
      else{ct=(val===null||val===undefined)?'':val;}
      tb+='<td'+cc+'>'+ct+'</td>';}tb+='</tr>';}
  document.getElementById('tbody').innerHTML=tb||'<tr><td colspan="'+HEADERS.length+'" style="text-align:center;color:#888;padding:20px">No data</td></tr>';
  document.getElementById('tcount').textContent='Showing '+(FILTERED.length>0?start+1:0)+'-'+end+' of '+FILTERED.length;
  document.getElementById('pageInfo').textContent='Page '+(PAGE+1)+' of '+tp;
  document.getElementById('prevBtn').disabled=PAGE===0;document.getElementById('nextBtn').disabled=end>=FILTERED.length;
}
function isRedVal(val,ci){if(ci>=SORTABLE_FROM){if(val===0||val==='0'||val===''||val===null||val===undefined)return true;}if(RATING_COLS.indexOf(ci)>=0){var n=parseFloat(val);if(!isNaN(n)&&n<3.5&&n>=0)return true;}return false;}
function isUrl(v){var s=String(v||'').trim();return s.indexOf('http://')===0||s.indexOf('https://')===0||s.indexOf('www.')===0;}
function makeLink(v){var s=String(v||'').trim();var href=s;if(s.indexOf('www.')===0)href='https://'+s;var d=s.replace(/^https?:\/\//,'').replace(/^www\./,'');if(d.length>30)d=d.substring(0,30)+'...';return'<a href="'+href+'" target="_blank" rel="noopener">'+d+'</a>';}
function changePage(dir){PAGE+=dir;renderTable();}
function changePageSize(){PAGE=0;renderTable();}
function downloadMainCSV(){
  if(!FILTERED.length){alert('No data!');return;}var csv=[];var hr=[];
  for(var i=0;i<HEADERS.length;i++)hr.push('"'+String(HEADERS[i]||'').replace(/"/g,'""')+'"');csv.push(hr.join(','));
  for(var r=0;r<FILTERED.length;r++){var row=[];for(var c=0;c<FILTERED[r].length;c++){row.push('"'+String(FILTERED[r][c]===null||FILTERED[r][c]===undefined?'':FILTERED[r][c]).replace(/"/g,'""')+'"');}csv.push(row.join(','));}
  var blob=new Blob([csv.join('\n')],{type:'text/csv;charset=utf-8;'});var link=document.createElement('a');link.href=URL.createObjectURL(blob);
  link.download='SKU_WISE_SALES_'+new Date().toISOString().slice(0,10)+'.csv';link.click();URL.revokeObjectURL(link.href);
}
loadData();
</script>

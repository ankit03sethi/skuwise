<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKU WISE Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#1a1a2e;color:#eee;padding:12px;min-height:100vh;overflow-x:hidden}
.header-row{display:flex;justify-content:center;align-items:center;position:relative;margin-bottom:4px}
h1{text-align:center;color:#39ff14;font-size:20px;letter-spacing:1px}
.global-search-wrap{position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;align-items:center}
.search-icon{background:none;border:none;cursor:pointer;padding:4px;display:flex;align-items:center}
.search-icon svg{width:28px;height:28px;fill:none;stroke:#39ff14}
.global-search{background:#0a0f1e;color:#eee;border:1px solid #444;border-radius:8px;padding:8px 14px;font-size:13px;width:0;opacity:0;transition:width .3s ease,opacity .3s ease,border-color .2s,padding .3s ease;overflow:hidden;padding:0}
.global-search.open{width:220px;opacity:1;padding:8px 14px;border-color:#39ff14}
.global-search:focus{border-color:#39ff14;outline:none;box-shadow:0 0 8px rgba(57,255,20,.3)}
.global-search::placeholder{color:#666}
.sub{text-align:center;color:#39ff14;font-size:20px;margin-bottom:12px;letter-spacing:1px;font-weight:700}
.loading{text-align:center;padding:80px;color:#4fc3f7;font-size:18px}
.spin{display:inline-block;width:30px;height:30px;border:3px solid #333;border-top:3px solid #4fc3f7;border-radius:50%;animation:sp .8s linear infinite;margin-bottom:10px}
@keyframes sp{to{transform:rotate(360deg)}}
.section-title{color:#4fc3f7;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;padding-left:4px;font-weight:600}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:10px}
.cd{background:#0d1a30;border-radius:10px;padding:10px;text-align:center;border-left:4px solid #4fc3f7;transition:.2s;cursor:pointer}
.cd:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(79,195,247,.3);border-left-color:#fff}
.cd.g{border-left-color:#39ff14}.cd.o{border-left-color:#e09f3e}.cd.r{border-left-color:#dc2f02}.cd.p{border-left-color:#a855f7}.cd.b{border-left-color:#4fc3f7}.cd.pk{border-left-color:#f72585}
.cd .lb{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.5px}
.cd .vl{font-size:20px;font-weight:700;color:#fff}
.fbox{background:#0d1a30;border-radius:10px;padding:12px;margin-bottom:12px}
.fbox h3{color:#4fc3f7;font-size:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.frow{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.frow select{background:#0a0f1e;color:#eee;border:1px solid #444;border-radius:6px;padding:5px 8px;font-size:11px;min-width:110px;max-width:160px}
.frow select:focus{border-color:#4fc3f7;outline:none}
.fbtn{background:#39ff14;color:#1a1a2e;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer}
.fbtn:hover{background:#2ed810}
.fbtn.ref{background:#e09f3e}.fbtn.ref:hover{background:#c88a2e}
.fbtn.clr{background:#dc2f02}.fbtn.clr:hover{background:#b02602}
.fbtn.dl{background:#4fc3f7}.fbtn.dl:hover{background:#3ab0e0}
.chs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.chb{background:#0d1a30;border-radius:10px;padding:12px}
.chb h3{color:#4fc3f7;font-size:11px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.chb canvas{max-height:240px}
.tbox{background:#0d1a30;border-radius:10px;padding:12px;margin-bottom:12px;position:relative}
.tbox h3{color:#4fc3f7;font-size:12px;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center}
.tbox h3 span{color:#888;font-size:11px;font-weight:400}
.twrap{overflow-x:auto;overflow-y:auto;max-height:500px;width:100%}
table{border-collapse:collapse;font-size:11px;white-space:nowrap;min-width:100%}
th{background:#0a1e40;color:#4fc3f7;padding:6px 8px;text-align:center;position:sticky;top:0;z-index:2;cursor:default;user-select:none}
th.sortable{cursor:pointer}
th.sortable:hover{background:#1a4a80;color:#39ff14}
th .arrow{margin-left:4px;font-size:10px;color:#39ff14}
td{padding:5px 8px;border-bottom:1px solid #1a1a2e;color:#ddd;text-align:center}
tr:nth-child(even) td{background:#0a0f1e}tr.trend-row td{background:transparent!important}
tr:hover td{background:#1f2b47}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.3px}
.bg{background:#143d14;color:#39ff14;border:1px solid #2a6b2a}
.br{background:#3d1414;color:#ff4444;border:1px solid #6b2a2a}
.zero{color:#ff4444;font-weight:700}
td a{color:#4fc3f7;text-decoration:none}
td a:hover{text-decoration:underline;color:#39ff14}
.pag{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:10px}
.pag button{background:#0a1e40;color:#4fc3f7;border:1px solid #444;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
.pag button:hover{background:#1a4a80}
.pag button:disabled{opacity:.3;cursor:default}
.pag span{color:#999;font-size:12px}
.srch{background:#0a0f1e;color:#eee;border:1px solid #444;border-radius:6px;padding:6px 10px;font-size:12px;width:200px}
.srch:focus{border-color:#4fc3f7;outline:none}
.ft{text-align:center;color:#555;font-size:10px;margin-top:8px}
.home-btn{background:none;border:none;cursor:pointer;padding:4px;position:absolute;left:0;top:50%;transform:translateY(-50%);display:flex;align-items:center}
.home-btn svg{width:28px;height:28px;fill:none;stroke:#39ff14}
@media(max-width:768px){.chs{grid-template-columns:1fr}.cards{grid-template-columns:repeat(auto-fit,minmax(100px,1fr))}.global-search.open{width:160px;font-size:11px;padding:6px 10px}}

/* CUSTOM NUMERIC DROPDOWN */
.num-dd-wrap{position:relative;display:inline-block}
.num-dd-btn{background:#0a0f1e;color:#eee;border:1px solid #444;border-radius:6px;padding:5px 8px;font-size:11px;min-width:110px;max-width:160px;cursor:pointer;text-align:left;display:flex;justify-content:space-between;align-items:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.num-dd-btn:hover{border-color:#4fc3f7}
.num-dd-btn .dd-arrow{margin-left:4px;font-size:8px;color:#888}
.num-dd-btn.active-filter{border-color:#39ff14;color:#39ff14}
.num-dd-panel{display:none;position:absolute;top:100%;left:0;z-index:50;background:#0a0f1e;border:1px solid #4fc3f7;border-radius:8px;width:200px;padding:6px;margin-top:4px;box-shadow:0 8px 24px rgba(0,0,0,.8)}
.num-dd-panel.show{display:block}
.num-dd-search{width:100%;background:#1a1a2e;color:#eee;border:1px solid #444;border-radius:5px;padding:5px 8px;font-size:11px;margin-bottom:4px}
.num-dd-search:focus{border-color:#4fc3f7;outline:none}
.num-dd-search::placeholder{color:#666}
.num-dd-sort{display:flex;flex-direction:column;gap:2px;margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid #333}
.num-dd-sort-item{padding:5px 8px;font-size:11px;color:#eee;cursor:pointer;border-radius:4px;transition:.15s}
.num-dd-sort-item:hover{background:#0d1a30;color:#4fc3f7}
.num-dd-sort-item.selected{background:#143d14;color:#39ff14;font-weight:600}
.num-dd-vals{max-height:180px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#444 #0a0f1e}
.num-dd-vals::-webkit-scrollbar{width:5px}
.num-dd-vals::-webkit-scrollbar-track{background:#0a0f1e}
.num-dd-vals::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
.num-dd-val-item{padding:4px 8px;font-size:11px;color:#ccc;cursor:pointer;border-radius:4px;transition:.15s}
.num-dd-val-item:hover{background:#0d1a30;color:#4fc3f7}
.num-dd-val-item.selected{background:#1a2d4a;color:#4fc3f7;font-weight:600}
.num-dd-clear{width:100%;background:#dc2f02;color:#fff;border:none;border-radius:4px;padding:4px;font-size:10px;font-weight:600;cursor:pointer;margin-top:4px}
.num-dd-clear:hover{background:#ff4444}

/* MODAL STYLES */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:100;overflow-y:auto;padding:20px}
.modal-overlay.show{display:block}
.modal-box{background:#111827;border:1px solid #444;border-radius:12px;max-width:1200px;margin:0 auto;padding:20px;position:relative;min-height:300px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #444}
.modal-title{color:#39ff14;font-size:16px;font-weight:700}
.modal-close{background:#dc2f02;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer}
.modal-close:hover{background:#ff4444}
.modal-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.modal-back{background:#4fc3f7;color:#1a1a2e;border:none;border-radius:6px;padding:5px 12px;font-size:12px;font-weight:700;cursor:pointer}
.modal-back:hover{background:#39ff14}
.modal-bread{color:#999;font-size:12px}
.modal-bread span{color:#4fc3f7;font-weight:600}
.drill-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.drill-item{background:#0d1a30;border-radius:10px;padding:14px;text-align:center;border-left:4px solid #4fc3f7;cursor:pointer;transition:.2s}
.drill-item:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(79,195,247,.3);border-left-color:#39ff14}
.drill-item .di-name{font-size:12px;color:#eee;font-weight:600;margin-bottom:4px}
.drill-item .di-count{font-size:22px;font-weight:700;color:#39ff14}
.drill-item.all-item{border-left-color:#e09f3e;background:#1a1a0d}
.drill-item.all-item:hover{border-left-color:#39ff14}
.drill-item.all-item .di-name{color:#e09f3e}
.modal-toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.m-tbox{background:#0d1a30;border-radius:10px;padding:12px;position:relative}
.m-tbox h3{color:#4fc3f7;font-size:12px;margin-bottom:8px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.m-tbox h3 span{color:#999;font-size:11px;font-weight:400}
.m-twrap{overflow-x:auto;overflow-y:auto;max-height:400px;width:100%}
.m-pag{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:10px}
.m-pag button{background:#0a1e40;color:#4fc3f7;border:1px solid #444;border-radius:6px;padding:5px 12px;font-size:12px;cursor:pointer}
.m-pag button:hover{background:#1a4a80}
.m-pag button:disabled{opacity:.3;cursor:default}
.m-pag span{color:#999;font-size:12px}
</style>
</head>
<body>
<div class="header-row">
  <button class="home-btn" onclick="clearFilters()" title="Home - Clear All Filters"><svg viewBox="0 0 24 24" fill="none" stroke="#39ff14" stroke-width="1.5"><path d="M4 12L12 4l8 8"/><path d="M6 10.5V19.5a.5.5 0 00.5.5H10v-5h4v5h3.5a.5.5 0 00.5-.5V10.5"/></svg></button>
  <div class="sub" id="info">SKU WISE</div>
  <div class="global-search-wrap">
    <input class="global-search" id="globalSearch" placeholder="Search SKUs..." oninput="globalSearchHandler()">
    <button class="search-icon" onclick="toggleSearch()" title="Search"><svg viewBox="0 0 24 24" fill="none" stroke="#39ff14" stroke-width="1.5"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg></button>
  </div>
</div>
<div id="loader" class="loading"><div class="spin"></div><br>Loading dashboard data...<br><span style="font-size:13px;color:#888">This may take 15-20 seconds</span></div>
<div id="app" style="display:none">

<!-- CARDS ROW 1: SALES -->
<div class="section-title">SALES</div>
<div class="cards" id="salesCards"></div>

<!-- CARDS ROW 2: TREND -->
<div class="section-title">SALES TREND</div>
<div class="cards" id="trendCards"></div>

<!-- CARDS ROW 3: STATUS -->
<div class="section-title">STATUS</div>
<div class="cards" id="statusCards"></div>

<!-- CARDS ROW 4: DAILY SALES LOSS -->
<div class="section-title">DAILY SALES LOSS</div>
<div class="cards" id="salesLossCards"></div>

<!-- CARDS ROW 5: ACTION -->
<div class="section-title">ACTION REQUIRED</div>
<div class="cards" id="actionCards"></div>

<!-- FILTERS -->
<div class="fbox">
<h3>Filters</h3>
<div class="frow" id="filterRow">
  <input class="srch" id="searchBox" placeholder="Search anything..." oninput="syncTableSearchFromFilter();applyAll()">
  <button class="fbtn" onclick="applyAll()">Apply</button>
  <button class="fbtn clr" onclick="clearFilters()">Clear</button>
  <button class="fbtn ref" onclick="loadData()">Refresh</button>
  <button class="fbtn clr" onclick="clearFilters()">Clear All Filters</button>
  <button class="fbtn dl" onclick="downloadMainCSV()">Download CSV</button>
</div>
</div>

<!-- CHARTS -->
<div class="chs">
  <div class="chb"><h3>Sales by Period</h3><canvas id="ch1"></canvas></div>
  <div class="chb"><h3>Stock Status</h3><canvas id="ch2"></canvas></div>
</div>
<div class="chs">
  <div class="chb"><h3>Platform Wise 30-Day Sales</h3><canvas id="ch3"></canvas></div>
  <div class="chb"><h3>Active / Inactive</h3><canvas id="ch4"></canvas></div>
</div>

<!-- MAIN TABLE -->
<div class="tbox">
<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:4px">
<h3 style="margin:0">All SKU Data <span id="ttotal" style="color:#39ff14;font-size:13px;font-weight:700;margin-left:8px"></span> <span id="tcount"></span></h3>
<div style="display:flex;align-items:center;gap:6px">
<svg viewBox="0 0 24 24" style="width:22px;height:22px;fill:none;stroke:#39ff14;stroke-width:1.5;flex-shrink:0"><circle cx="11" cy="11" r="7"/><path d="M16.5 16.5L21 21"/></svg>
<input id="tableSearchBox" placeholder="Search SKUs..." oninput="tableSearchSync(this.value)" style="background:#0a0f1e;color:#eee;border:1px solid #39ff14;border-radius:6px;padding:6px 12px;font-size:12px;width:220px;outline:none">
</div>
</div>
<div class="twrap">
  <table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table>
</div>
<div class="pag">
  <div style="color:#4fc3f7;font-size:12px">Scroll to load more...</div>
</div>
</div>
<div class="ft" id="lastUp"></div>
</div>

<!-- DRILL-DOWN MODAL -->
<div class="modal-overlay" id="modalOverlay">
<div class="modal-box">
  <div class="modal-header">
    <div class="modal-title" id="modalTitle">Drill Down</div>
    <button class="modal-close" onclick="closeModal()">X CLOSE</button>
  </div>
  <div class="modal-nav" id="modalNav" style="display:none">
    <button class="modal-back" id="modalBackBtn" onclick="modalGoBack()">&#9664; Back</button>
    <div class="modal-bread" id="modalBread"></div>
  </div>
  <div id="modalContent"></div>
</div>
</div>

<!-- GLOBAL SEARCH RESULTS PANEL -->
<div id="globalResultsPanel" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.9);z-index:90;overflow-y:auto;padding:20px">
<div style="background:#111827;border:1px solid #444;border-radius:12px;max-width:1400px;margin:0 auto;padding:20px;position:relative">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #444">
    <div style="color:#39ff14;font-size:16px;font-weight:700" id="gResTitle">Search Results</div>
    <button class="modal-close" onclick="closeGlobalSearch()">X CLOSE</button>
  </div>
  <div id="gResContent"></div>
</div>
</div>

<script>
var API_URL='https://script.google.com/macros/s/AKfycbyNBxJCgec1Pge6JX-4iqkTqdTnKZeo56YTo5LlldoiDUHum578CrZczV79h4j6OKfYMA/exec';
var ALL_DATA=[],HEADERS=[],FILTERED=[],SORT_COL=-1,SORT_DIR=1,PAGE=0,PER_PAGE=100;
var MISSING_UNIQUES=[];
var STOCK_COL=12,ACTIVE_COL=13,PLATFORM_COL=1,COMPANY_COL=2;
var CAT_COL=5,SUBCAT_COL=6,PRODUCT_COL=8,SKU_NAME_COL=9;
var PRICE_R_COL=17,PRICE_W_COL=22;
var SORTABLE_FROM=15;
var CHS={};
var RATING_COLS=[];
var NUMERIC_COLS=[];
var NUMERIC_UNIQUE_VALS={};
var STOCK_IN_PLAT_COL=-1;

// Infinite scroll state
var LOADED=0,BATCH_SIZE=100;
var M_LOADED=0;
var G_LOADED=0;

// Numeric dropdown state
var numDDState={};

// Text dropdown state for columns with >200 unique values
var textDDState={};
var TEXT_UNIQUE_VALS={};

// Modal state
var M={level:0,type:'',label:'',hasReasonLevel:false,reason:'',platform:'',company:'',baseData:[],reasonData:[],platformData:[],skuList:[],skuFiltered:[],sortCol:-1,sortDir:1,page:0,tableFrom:0};

// Global search state
var G_TIMER=null,G_RESULTS=[],G_PAGE=0,G_SORT_COL=-1,G_SORT_DIR=1;

// ===== HELPER: Check if value is "active" (valid number including 0) =====
function isActiveValue(val){
  if(val===0)return true;
  if(val===''||val===null||val===undefined)return false;
  var s=String(val).trim();
  if(s==='')return false;
  var n=Number(s);
  return !isNaN(n)&&isFinite(n);
}

// ===== LOAD DATA =====
function loadData(){
  document.getElementById('loader').style.display='block';
  document.getElementById('app').style.display='none';
  document.getElementById('loader').innerHTML='<div class="spin"></div><br>Loading dashboard data...<br><span style="font-size:13px;color:#888">This may take 15-30 seconds</span>';
  var controller=new AbortController();
  var timeoutId=setTimeout(function(){controller.abort();},90000);
  fetch(API_URL,{redirect:'follow',signal:controller.signal})
    .then(function(r){clearTimeout(timeoutId);if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(function(text){
      if(!text||text.trim().length===0){onErr('Empty response.');return;}
      if(text.trim().charAt(0)==='<'){onErr('API returned HTML. Deploy with access: Anyone');return;}
      try{var d=JSON.parse(text);onDataLoaded(d);}catch(e){onErr('JSON error: '+e.message);}
    })
    .catch(function(e){
      clearTimeout(timeoutId);
      onErr((e.name==='AbortError'?'Timeout.':'Fetch failed: '+e.message)+'<br><a href="'+API_URL+'" target="_blank" style="color:#4fc3f7">Test API</a>');
    });
}
function onDataLoaded(d){
  if(d.error){onErr(d.error);return;}
  var rawRows=d.rows||[];var cleanRows=[];
  for(var i=0;i<rawRows.length;i++){if(rawRows[i][0]&&String(rawRows[i][0]).trim()!=='')cleanRows.push(rawRows[i]);}
  ALL_DATA=cleanRows;HEADERS=d.headers||[];
  MISSING_UNIQUES=d.missingUniques||[];
  detectRatingCols();detectNumericCols();collectNumericUniqueVals();detectStockInPlatCol();
  document.getElementById('loader').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('lastUp').textContent='Updated: '+new Date().toLocaleString();
  document.getElementById('info').textContent='SKU WISE';
  buildColumnFilters();applyAll();startSoftRefresh();
}
function onErr(msg){document.getElementById('loader').innerHTML='<div style="color:#dc2f02;font-size:14px">'+msg+'</div>';}
function fmt(n){return n==null?'0':Number(n).toLocaleString('en-IN');}

// ===== TABLE SEARCH BAR SYNC =====
function tableSearchSync(val){
  document.getElementById('searchBox').value=val;
  applyAll();
}
function syncTableSearchFromFilter(){
  var ts=document.getElementById('tableSearchBox');
  if(ts)ts.value=document.getElementById('searchBox').value;
}

// ===== SOFT AUTO-REFRESH =====
var SOFT_REFRESH_INTERVAL=60000;
var _softTimer=null;
function startSoftRefresh(){if(_softTimer)clearInterval(_softTimer);_softTimer=setInterval(softRefresh,SOFT_REFRESH_INTERVAL);}
function softRefresh(){
  fetch(API_URL,{redirect:'follow'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(function(text){
      if(!text||text.trim().length===0)return;
      if(text.trim().charAt(0)==='<')return;
      try{
        var d=JSON.parse(text);
        if(d.error)return;
        var rawRows=d.rows||[];var cleanRows=[];
        for(var i=0;i<rawRows.length;i++){if(rawRows[i][0]&&String(rawRows[i][0]).trim()!=='')cleanRows.push(rawRows[i]);}
        ALL_DATA=cleanRows;HEADERS=d.headers||[];
        MISSING_UNIQUES=d.missingUniques||[];
        detectRatingCols();detectNumericCols();collectNumericUniqueVals();detectStockInPlatCol();
        document.getElementById('lastUp').textContent='Updated: '+new Date().toLocaleString();
        var scrollY=window.scrollY;
        applyAll();
        window.scrollTo(0,scrollY);
      }catch(e){}
    })
    .catch(function(){});
}

// ===== SALES INDEXES =====
function getSalesIndexes(){
  var ci={today:-1,day3:-1,day7:-1,day15:-1,day30:-1,day60:-1};
  for(var i=0;i<HEADERS.length;i++){
    var h=String(HEADERS[i]||'').toUpperCase().trim();
    if(h.indexOf('1 DAY')>=0||h.indexOf('TODAY')>=0)ci.today=i;
    else if(h.indexOf('3 DAY')>=0)ci.day3=i;
    else if(h.indexOf('7 DAY')>=0)ci.day7=i;
    else if(h.indexOf('15 DAY')>=0)ci.day15=i;
    else if(h.indexOf('60 DAY')>=0)ci.day60=i;
    else if(h.indexOf('30 DAY')>=0)ci.day30=i;
  }
  if(ci.today<0){var n=HEADERS.length;ci.today=n-6;ci.day3=n-5;ci.day7=n-4;ci.day15=n-3;ci.day30=n-2;ci.day60=n-1;}
  return ci;
}

// ===== TREND CALCULATION =====
var TREND_THRESHOLD=0.20; // 20% tolerance for "stable"
function getTrend(row){
  var ci=getSalesIndexes();
  var s7=Number(row[ci.day7])||0;
  var s60=Number(row[ci.day60])||0;
  if(s60<30)return 'nosale';
  if(s7===0&&s60===0)return 'nosale';
  var avg7=s7/7;var avg60=s60/60;
  if(avg60===0&&avg7>0)return 'uptrend';
  if(avg7===0&&avg60>0)return 'downtrend';
  var ratio=avg7/avg60;
  if(ratio>(1+TREND_THRESHOLD))return 'uptrend';
  if(ratio<(1-TREND_THRESHOLD))return 'downtrend';
  return 'stable';
}
function getTrendBgColor(trend){
  switch(trend){
    case 'uptrend':return 'rgba(0,255,65,0.3)';
    case 'downtrend':return 'rgba(255,20,20,0.3)';
    case 'stable':return 'rgba(255,255,0,0.25)';
    default:return '';
  }
}

// ===== CARD FILTER LOGIC =====
function filterByType(type,dataset){
  var src=dataset||ALL_DATA;
  var ci=getSalesIndexes();var result=[];
  for(var i=0;i<src.length;i++){
    var r=src[i];
    var stock=String(r[STOCK_COL]||'').trim().toUpperCase();
    var active=String(r[ACTIVE_COL]||'').trim().toUpperCase();
    var activeNum=parseFloat(r[ACTIVE_COL]);
    switch(type){
      case 'total':result.push(r);break;
      case 'active':if(isActiveValue(r[ACTIVE_COL]))result.push(r);break;
      case 'inactive':if(!isActiveValue(r[ACTIVE_COL]))result.push(r);break;
      case 'instock':if(stock==='IN STOCK')result.push(r);break;
      case 'outofstock':if(stock==='OUT OF STOCK')result.push(r);break;
      case 'today':if((Number(r[ci.today])||0)>0)result.push(r);break;
      case 'day3':if((Number(r[ci.day3])||0)>0)result.push(r);break;
      case 'day7':if((Number(r[ci.day7])||0)>0)result.push(r);break;
      case 'day15':if((Number(r[ci.day15])||0)>0)result.push(r);break;
      case 'day30':if((Number(r[ci.day30])||0)>0)result.push(r);break;
      case 'day60':if((Number(r[ci.day60])||0)>0)result.push(r);break;
      case 'needopen':
        if(STOCK_IN_PLAT_COL>=0){var sv0=String(r[STOCK_IN_PLAT_COL]===null||r[STOCK_IN_PLAT_COL]===undefined?'':r[STOCK_IN_PLAT_COL]).trim();var sipVal=parseFloat(sv0);if(stock==='IN STOCK'&&sv0!==''&&!isNaN(sipVal)&&sipVal===0)result.push(r);}
        else{if(stock==='IN STOCK'&&!isActiveValue(r[ACTIVE_COL]))result.push(r);}break;
      case 'needclose':
        if(STOCK_IN_PLAT_COL>=0){var sipVal2=parseFloat(r[STOCK_IN_PLAT_COL]);if(stock!=='IN STOCK'&&stock!==''&&!isNaN(sipVal2)&&sipVal2>0)result.push(r);}
        else{if(stock!=='IN STOCK'&&stock!==''&&isActiveValue(r[ACTIVE_COL])&&activeNum>0)result.push(r);}break;
      case 'inactiveInStock':
        if(!isActiveValue(r[ACTIVE_COL])&&stock==='IN STOCK')result.push(r);break;
      case 'uptrend':if(getTrend(r)==='uptrend')result.push(r);break;
      case 'downtrend':if(getTrend(r)==='downtrend')result.push(r);break;
      case 'stable':if(getTrend(r)==='stable')result.push(r);break;
      case 'nosale':if(getTrend(r)==='nosale')result.push(r);break;
      case 'highshipping':{var rP=parseFloat(r[PRICE_R_COL]),wP=parseFloat(r[PRICE_W_COL]);if(!isNaN(rP)&&!isNaN(wP)&&rP>0&&wP>0&&rP>=wP*1.05)result.push(r);break;}
      case 'lowprice':{var rP2=parseFloat(r[PRICE_R_COL]),wP2=parseFloat(r[PRICE_W_COL]);if(!isNaN(rP2)&&!isNaN(wP2)&&rP2>0&&wP2>0&&rP2<=wP2*0.95)result.push(r);break;}
      case 'salesloss':if(stock==='OUT OF STOCK'&&isActiveValue(r[ACTIVE_COL]))result.push(r);break;
      case 'totalloss':{var added=false;
        if(stock==='OUT OF STOCK'&&isActiveValue(r[ACTIVE_COL])){result.push(r);added=true;}
        if(!added&&!isActiveValue(r[ACTIVE_COL])&&stock==='IN STOCK'){result.push(r);added=true;}
        if(!added){if(STOCK_IN_PLAT_COL>=0){var sv3=String(r[STOCK_IN_PLAT_COL]===null||r[STOCK_IN_PLAT_COL]===undefined?'':r[STOCK_IN_PLAT_COL]).trim();var sipVal3=parseFloat(sv3);if(stock==='IN STOCK'&&sv3!==''&&!isNaN(sipVal3)&&sipVal3===0){result.push(r);}}
        else{if(stock==='IN STOCK'&&!isActiveValue(r[ACTIVE_COL]))result.push(r);}}break;}
    }
  }
  return result;
}

      document.getElementById('modalNav').style.display='none';

function groupBy(data,col){
  var map={};
  for(var i=0;i<data.length;i++){var k=String(data[i][col]||'').trim()||'(blank)';if(!map[k])map[k]=0;map[k]++;}
  var arr=[];for(var k in map)arr.push({name:k,count:map[k]});
  arr.sort(function(a,b){return b.count-a.count;});return arr;
}
function groupBySum(data,groupCol,sumCol){
  var map={};
  for(var i=0;i<data.length;i++){var k=String(data[i][groupCol]||'').trim()||'(blank)';if(!map[k])map[k]=0;map[k]+=Number(data[i][sumCol])||0;}
  var arr=[];for(var k in map)arr.push({name:k,count:map[k]});
  arr.sort(function(a,b){return b.count-a.count;});return arr;
}
function getTotalVal(data,sumCol){
  if(sumCol<0)return data.length;
  var t=0;for(var i=0;i<data.length;i++)t+=Number(data[i][sumCol])||0;return t;
}

function drillToReason(reason){
  if(!reason){
    // ALL clicked - show SKU table directly
    M.level=4;M.reason='';M.platform='';M.company='';
    M.reasonData=M.baseData.slice();
    M.skuList=M.baseData.slice();
    M.skuFiltered=M.skuList.slice();M.sortCol=-1;M.sortDir=1;M.page=0;
    M.tableFrom=1;
    document.getElementById('modalTitle').textContent=M.label+' - ALL';
    document.getElementById('modalNav').style.display='flex';
    document.getElementById('modalBread').innerHTML='<span>'+M.label+'</span> &rarr; <span>ALL</span>';
    renderModalTable();
    return;
  }
  M.level=2;M.reason=reason;
  M.reasonData=[];
  for(var i=0;i<M.baseData.length;i++){

    if(v===reason)M.reasonData.push(M.baseData[i]);

function drillToPlatform(platform){

    // ALL clicked - show SKU table directly
    M.level=M.hasReasonLevel?4:3;M.platform='';M.company='';
    M.platformData=src.slice();

  var bread='<span>'+M.label+'</span>';

// ===== COMPANY LEVEL =====
function renderDrillCompanies(){
  var companies=M.sumCol>=0?groupBySum(M.platformData,COMPANY_COL,M.sumCol):groupBy(M.platformData,COMPANY_COL);
  var totalVal=getTotalVal(M.platformData,M.sumCol);
  var colors=['#4fc3f7','#39ff14','#e09f3e','#a855f7','#dc2f02','#f72585','#7209b7'];
  var h='<div class="drill-grid">';
  // ALL option first
  h+='<div class="drill-item all-item" onclick="drillToCompany(\'\')">';
  h+='<div class="di-name">ALL</div><div class="di-count">'+fmt(totalVal)+'</div></div>';
  for(var i=0;i<companies.length;i++){
    var c=companies[i];
    h+='<div class="drill-item" style="border-left-color:'+colors[i%colors.length]+'" onclick="drillToCompany(\''+c.name.replace(/'/g,"\\'")+'\')">';
    h+='<div class="di-name">'+c.name+'</div><div class="di-count">'+fmt(c.count)+'</div></div>';
  }
  h+='</div>';
  document.getElementById('modalContent').innerHTML=h;
}
function drillToCompany(company){
  var nextLevel=M.hasReasonLevel?4:3;
  M.level=nextLevel;M.company=company;
  M.tableFrom=M.hasReasonLevel?3:2;
  if(company){
    M.skuList=[];
    for(var i=0;i<M.platformData.length;i++){
      if(String(M.platformData[i][COMPANY_COL]||'').trim()===company)M.skuList.push(M.platformData[i]);
    }
  } else {
    M.skuList=M.platformData.slice();
  }
  M.skuFiltered=M.skuList.slice();M.sortCol=-1;M.sortDir=1;M.page=0;
  var title=M.label+' - '+(M.platform||'ALL')+' - '+(company||'ALL Companies');
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalNav').style.display='flex';
  var bread='<span>'+M.label+'</span>';
  if(M.hasReasonLevel)bread+=' &rarr; <span>'+(M.reason||'ALL')+'</span>';
  bread+=' &rarr; <span>'+(M.platform||'ALL')+'</span> &rarr; <span>'+(company||'ALL')+'</span>';
  document.getElementById('modalBread').innerHTML=bread;
  renderModalTable();
}
function renderModalTable(){
  var sq=(document.getElementById('mSearch')?document.getElementById('mSearch').value:'').trim().toUpperCase();
  M.skuFiltered=[];
  for(var i=0;i<M.skuList.length;i++){
    var r=M.skuList[i];
    if(sq){var f=false;for(var j=0;j<r.length;j++){if(String(r[j]||'').toUpperCase().indexOf(sq)>=0){f=true;break;}}if(!f)continue;}
    M.skuFiltered.push(r);
  }
  if(M.sortCol>=0){
    M.skuFiltered.sort(function(a,b){
      var va=a[M.sortCol],vb=b[M.sortCol];
      var na=parseFloat(va),nb=parseFloat(vb);
      if(isNaN(na))na=-999999;if(isNaN(nb))nb=-999999;
      if(!isNaN(parseFloat(va))&&!isNaN(parseFloat(vb)))return(na-nb)*M.sortDir;
      va=String(va||'').toUpperCase();vb=String(vb||'').toUpperCase();
      return va<vb?-1*M.sortDir:va>vb?1*M.sortDir:0;
    });
  }
  M_LOADED=0;
  var h='<div class="modal-toolbar"><input class="srch" id="mSearch" placeholder="Search SKUs..." oninput="renderModalTable()" value="'+(sq||'')+'">';
  h+='<button class="fbtn dl" onclick="downloadModalCSV()">Download CSV</button></div>';
  h+='<div class="m-tbox"><h3>SKU Details <span>Showing 0-0 of '+M.skuFiltered.length+'</span></h3>';
  h+='<div class="m-twrap"><table><thead><tr>';
  for(var i=0;i<HEADERS.length;i++){
    var arrow='';if(M.sortCol===i)arrow='<span class="arrow">'+(M.sortDir===1?'\u25B2':'\u25BC')+'</span>';
    h+='<th class="sortable" onclick="mSort('+i+')">'+displayHeader(i)+arrow+'</th>';
  }
  h+='</tr></thead><tbody id="modalTableBody"></tbody></table></div>';
  h+='<div class="m-pag"><div style="color:#4fc3f7;font-size:12px">Scroll to load more...</div></div></div>';
  document.getElementById('modalContent').innerHTML=h;
  loadMoreModalRows();
  // Attach scroll listener to .m-twrap
  var mtwrap=document.querySelector('.m-twrap');
  if(mtwrap.scrollListener){mtwrap.removeEventListener('scroll',mtwrap.scrollListener);}
  mtwrap.scrollListener=function(){
    if(mtwrap.scrollTop+mtwrap.clientHeight>=mtwrap.scrollHeight-100){
      if(M_LOADED<M.skuFiltered.length){loadMoreModalRows();}
    }
  };
  mtwrap.addEventListener('scroll',mtwrap.scrollListener);
}
function loadMoreModalRows(){
  var start=M_LOADED;var end=Math.min(M_LOADED+100,M.skuFiltered.length);
  var h='';
  for(var i=start;i<end;i++){
    var r=M.skuFiltered[i];var mBg=getTrendBgColor(getTrend(r));
    h+='<tr'+(mBg?' class="trend-row" style="background:'+mBg+'"':'')+'>';
    for(var j=0;j<r.length;j++){h+=formatCellValue(r[j],j);}
    h+='</tr>';
  }
  var tbody=document.getElementById('modalTableBody');
  if(start===0)tbody.innerHTML=h;else tbody.innerHTML+=h;
  M_LOADED=end;
  // Update h3 span with current counts
  var h3=document.querySelector('.m-tbox h3 span');
  if(h3)h3.textContent='Showing '+(M.skuFiltered.length>0?1:0)+'-'+M_LOADED+' of '+M.skuFiltered.length;
  // Update pagination div
  var mpag=document.querySelector('.m-pag');
  if(M_LOADED>=M.skuFiltered.length){
    mpag.innerHTML='<div style="color:#999;font-size:12px">All '+fmt(M.skuFiltered.length)+' rows loaded</div>';
  } else {
    mpag.innerHTML='<div style="color:#4fc3f7;font-size:12px">Loaded '+fmt(M_LOADED)+' of '+fmt(M.skuFiltered.length)+' • Scroll to load more...</div>';
  }
}
function mSort(col){if(M.sortCol===col){M.sortDir*=-1;}else{M.sortCol=col;M.sortDir=1;}renderModalTable();}
function downloadModalCSV(){
  var data=M.skuFiltered.length?M.skuFiltered:M.skuList;
  if(!data.length){alert('No data!');return;}
  var csv=[];var hr=[];
  for(var i=0;i<HEADERS.length;i++)hr.push('"'+String(HEADERS[i]||'').replace(/"/g,'""')+'"');
  csv.push(hr.join(','));
  for(var r=0;r<data.length;r++){var row=[];for(var c=0;c<data[r].length;c++){row.push('"'+String(data[r][c]===null||data[r][c]===undefined?'':data[r][c]).replace(/"/g,'""')+'"');}csv.push(row.join(','));}
  var blob=new Blob([csv.join('\n')],{type:'text/csv;charset=utf-8;'});
  var link=document.createElement('a');link.href=URL.createObjectURL(blob);
  link.download='SKU_'+M.label.replace(/\s+/g,'_')+'_'+(M.platform||'ALL')+'_'+new Date().toISOString().slice(0,10)+'.csv';
  link.click();URL.revokeObjectURL(link.href);
}

// ===== DAILY SALES LOSS DRILL-DOWN =====
var SL={};var SL_LOADED=0;
function groupByDailyLoss(data,groupCol){
  var ci=getSalesIndexes();var map={};
  for(var i=0;i<data.length;i++){var k=String(data[i][groupCol]||'').trim()||'(blank)';if(!map[k])map[k]=0;map[k]+=((Number(data[i][ci.day60])||0)/60);}
  var arr=[];for(var k in map)arr.push({name:k,loss:Math.round(map[k])});
  arr.sort(function(a,b){return b.loss-a.loss;});return arr;
}
function slTotalLoss(data){
  var ci=getSalesIndexes();var t=0;
  for(var i=0;i<data.length;i++)t+=((Number(data[i][ci.day60])||0)/60);
  return Math.round(t);
}
function hasAnySale(row){
  var ci=getSalesIndexes();
  return (Number(row[ci.today])||0)>0||(Number(row[ci.day3])||0)>0||(Number(row[ci.day7])||0)>0||(Number(row[ci.day15])||0)>0||(Number(row[ci.day30])||0)>0||(Number(row[ci.day60])||0)>0;
}
function filterWithSales(data){var r=[];for(var i=0;i<data.length;i++){if(hasAnySale(data[i]))r.push(data[i]);}return r;}
function openSalesLossType(filterType,title){
  var data=filterWithSales(filterByType(filterType,FILTERED));
  SL={level:1,title:title,baseData:data,catData:[],subcatData:[],prodData:[],skuData:[],skuFiltered:[],cat:'',subcat:'',prod:'',sortCol:-1,sortDir:1};
  document.getElementById('modalTitle').textContent=title+' - Categories';
  document.getElementById('modalNav').style.display='none';
  renderSLCategories();
  document.getElementById('modalOverlay').className='modal-overlay show';
  document.body.style.overflow='hidden';
}
function slBread(){
  var t=SL.title||'Daily Sales Loss';
  var parts=['<span style="cursor:pointer;color:#4fc3f7" onclick="slGoTo(0)">'+t+'</span>'];
  if(SL.cat)parts.push('<span style="cursor:pointer;color:#4fc3f7" onclick="slGoTo(1)">'+SL.cat+'</span>');
  if(SL.subcat)parts.push('<span style="cursor:pointer;color:#4fc3f7" onclick="slGoTo(2)">'+SL.subcat+'</span>');
  if(SL.prod)parts.push('<span>'+SL.prod+'</span>');
  document.getElementById('modalBread').innerHTML=parts.join(' &rarr; ');
}
function slGoTo(level){
  var t=SL.title||'Daily Sales Loss';
  if(level===0){SL.level=1;SL.cat='';SL.subcat='';SL.prod='';document.getElementById('modalTitle').textContent=t+' - Categories';document.getElementById('modalNav').style.display='none';renderSLCategories();}
  else if(level===1){SL.level=2;SL.subcat='';SL.prod='';document.getElementById('modalTitle').textContent=t+' - '+SL.cat+' - Sub Categories';document.getElementById('modalNav').style.display='flex';slBread();renderSLSubcats();}
  else if(level===2){SL.level=3;SL.prod='';document.getElementById('modalTitle').textContent=t+' - '+SL.subcat+' - Products';document.getElementById('modalNav').style.display='flex';slBread();renderSLProducts();}
}
var SL_GRID_ITEMS=[];
function slGridClick(fn,idx){if(idx===0)window[fn]('');else if(SL_GRID_ITEMS[idx])window[fn](SL_GRID_ITEMS[idx]);}
function slGrid(items,clickFn,allData){
  SL_GRID_ITEMS=[''];
  var h='<div class="drill-grid">';
  var total=slTotalLoss(allData);
  h+='<div class="drill-item" style="border-left-color:#ff4444;background:#1a0d0d" onclick="slGridClick(\''+clickFn+'\',0)"><div class="di-name" style="color:#eee">ALL</div><div class="di-count" style="color:#ff4444">'+fmt(total)+'</div></div>';
  for(var i=0;i<items.length;i++){
    var p=items[i];if(p.loss<=0)continue;
    SL_GRID_ITEMS.push(p.name);
    var idx=SL_GRID_ITEMS.length-1;
    h+='<div class="drill-item" style="border-left-color:#ff4444;background:#1a0d0d" onclick="slGridClick(\''+clickFn+'\','+idx+')">';
    h+='<div class="di-name" style="color:#eee">'+p.name+'</div><div class="di-count" style="color:#ff4444">'+fmt(p.loss)+'</div></div>';
  }
  h+='</div>';return h;
}

  var cats=groupByDailyLoss(SL.baseData,CAT_COL);

// ===== GLOBAL SEARCH (TOP RIGHT) =====
function toggleSearch(){
  var inp=document.getElementById('globalSearch');
  inp.classList.toggle('open');
  if(inp.classList.contains('open')){inp.focus();}else{inp.value='';closeGlobalSearch();}
}
function globalSearchHandler(){
  clearTimeout(G_TIMER);
  var val=document.getElementById('globalSearch').value.trim();
  if(!val){closeGlobalSearch();return;}
  G_TIMER=setTimeout(function(){runGlobalSearch(val);},400);
}
function runGlobalSearch(q){
  var qu=q.toUpperCase();
  G_RESULTS=[];
  for(var i=0;i<ALL_DATA.length;i++){
    var r=ALL_DATA[i];var found=false;
    for(var j=0;j<r.length;j++){if(String(r[j]||'').toUpperCase().indexOf(qu)>=0){found=true;break;}}
    if(found)G_RESULTS.push(r);
  }
  G_PAGE=0;G_SORT_COL=-1;G_SORT_DIR=1;
  document.getElementById('gResTitle').textContent='Search Results for "'+q+'" ('+fmt(G_RESULTS.length)+' matches)';
  renderGlobalResults();
  document.getElementById('globalResultsPanel').style.display='block';
  document.body.style.overflow='hidden';
}
function renderGlobalResults(){
  var data=G_RESULTS;
  if(G_SORT_COL>=0){
    data=G_RESULTS.slice();
    data.sort(function(a,b){
      var va=a[G_SORT_COL],vb=b[G_SORT_COL];
      var na=parseFloat(va),nb=parseFloat(vb);
      if(isNaN(na))na=-999999;if(isNaN(nb))nb=-999999;
      if(!isNaN(parseFloat(va))&&!isNaN(parseFloat(vb)))return(na-nb)*G_SORT_DIR;
      va=String(va||'').toUpperCase();vb=String(vb||'').toUpperCase();
      return va<vb?-1*G_SORT_DIR:va>vb?1*G_SORT_DIR:0;
    });
    G_RESULTS=data;
  }
  G_LOADED=0;
  var h='<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center"><button class="fbtn dl" onclick="downloadGlobalCSV()">Download CSV</button></div>';
  h+='<div class="m-tbox"><h3>Full SKU Data <span>Showing 0-0 of '+data.length+'</span></h3>';
  h+='<div class="m-twrap"><table><thead><tr>';
  for(var i=0;i<HEADERS.length;i++){
    var arrow='';if(G_SORT_COL===i)arrow='<span class="arrow">'+(G_SORT_DIR===1?'\u25B2':'\u25BC')+'</span>';
    h+='<th class="sortable" onclick="gSort('+i+')">'+displayHeader(i)+arrow+'</th>';
  }
  h+='</tr></thead><tbody id="gResTableBody">';
  if(data.length===0)h+='<tr><td colspan="'+HEADERS.length+'" style="text-align:center;color:#888;padding:20px">No results found</td></tr>';
  h+='</tbody></table></div>';
  h+='<div class="m-pag"><div style="color:#4fc3f7;font-size:12px">Scroll to load more...</div></div></div>';
  document.getElementById('gResContent').innerHTML=h;
  if(data.length>0){
    loadMoreGlobalRows();
    // Attach scroll listener to .m-twrap
    var gtwrap=document.querySelector('#gResContent .m-twrap');
    if(gtwrap.scrollListener){gtwrap.removeEventListener('scroll',gtwrap.scrollListener);}
    gtwrap.scrollListener=function(){
      if(gtwrap.scrollTop+gtwrap.clientHeight>=gtwrap.scrollHeight-100){
        if(G_LOADED<G_RESULTS.length){loadMoreGlobalRows();}
      }
    };
    gtwrap.addEventListener('scroll',gtwrap.scrollListener);
  }
}
function loadMoreGlobalRows(){
  var data=G_RESULTS;
  var start=G_LOADED;var end=Math.min(G_LOADED+100,data.length);
  var h='';
  for(var i=start;i<end;i++){
    var r=data[i];var gBg=getTrendBgColor(getTrend(r));
    h+='<tr'+(gBg?' class="trend-row" style="background:'+gBg+'"':'')+'>';
    for(var j=0;j<r.length;j++){h+=formatCellValue(r[j],j);}
    h+='</tr>';
  }
  var tbody=document.getElementById('gResTableBody');
  if(start===0)tbody.innerHTML=h;else tbody.innerHTML+=h;
  G_LOADED=end;
  // Update h3 span with current counts

function downloadGlobalCSV(){

function detectRatingCols(){RATING_COLS=[];for(var i=0;i<HEADERS.length;i++){var h=String(HEADERS[i]||'').toUpperCase();if(h.indexOf('RATING')>=0||h.indexOf('STAR')>=0||h.indexOf('REVIEW')>=0)RATING_COLS.push(i);}}
function detectNumericCols(){NUMERIC_COLS=[];for(var c=0;c<HEADERS.length;c++){var nc=0,t=0;for(var r=0;r<ALL_DATA.length&&r<500;r++){var v=ALL_DATA[r][c];if(v===''||v===null||v===undefined)continue;var sv=String(v).trim();if(sv==='-'||sv==='--'||sv==='N/A'||sv==='n/a'||sv==='NA')continue;t++;if(!isNaN(Number(sv)))nc++;}if(t>0&&nc/t>0.7)NUMERIC_COLS.push(c);}}
function collectNumericUniqueVals(){
  NUMERIC_UNIQUE_VALS={};
  for(var ci=0;ci<NUMERIC_COLS.length;ci++){
    var c=NUMERIC_COLS[ci];var map={};
    for(var r=0;r<ALL_DATA.length;r++){
      var v=ALL_DATA[r][c];if(v===''||v===null||v===undefined)continue;
      var num=Number(v);if(!isNaN(num))map[num]=1;
    }
    var arr=Object.keys(map).map(Number);arr.sort(function(a,b){return a-b;});
    NUMERIC_UNIQUE_VALS[c]=arr;
  }
}

function applyAll(){
  var tf=[];var ns=null;var exactFilters=[];var textFilters=[];var rangeFilters=[];
  var aiFilter='';var trendFilter='';var hsFilter='';var lpFilter='';
  var sels=document.querySelectorAll('.col-filter');
  for(var i=0;i<sels.length;i++){
    var v=sels[i].value;if(!v)continue;
    var dtype=sels[i].getAttribute('data-type');
    if(dtype==='special-ai'){aiFilter=v;continue;}
    if(dtype==='special-trend'){trendFilter=v;continue;}
    if(dtype==='special-hs'){hsFilter=v;continue;}
    if(dtype==='special-lp'){lpFilter=v;continue;}
    var col=parseInt(sels[i].getAttribute('data-col'));
    tf.push({col:col,val:v.toUpperCase()});
  }
  for(var k in numDDState){
    var col=parseInt(k);var state=numDDState[k];
    if(state.sort){ns={col:col,dir:state.sort==='low-high'?1:-1};}
    if(state.exactVal!==null){exactFilters.push({col:col,val:state.exactVal});}
    if(state.rangeOp){rangeFilters.push({col:col,op:state.rangeOp,val:state.rangeVal});}
  }
  for(var k in textDDState){
    var col=parseInt(k);var state=textDDState[k];
    if(state.exactVal!==null){textFilters.push({col:col,val:state.exactVal});}
  }
  var sq=document.getElementById('searchBox').value.trim().toUpperCase();
  FILTERED=[];
  for(var i=0;i<ALL_DATA.length;i++){
    var r=ALL_DATA[i];var pass=true;
    for(var f=0;f<tf.length;f++){if(String(r[tf[f].col]||'').trim().toUpperCase()!==tf[f].val){pass=false;break;}}
    if(!pass)continue;
    // Active/Inactive filter using isActiveValue
    if(aiFilter){
      if(aiFilter==='ACTIVE'){
        if(!isActiveValue(r[ACTIVE_COL])){pass=false;}
      } else if(aiFilter==='INACTIVE'){
        if(isActiveValue(r[ACTIVE_COL])){pass=false;}
      }
    }
    if(!pass)continue;
    // Trend filter
    if(trendFilter){
      var t=getTrend(r);
      if(trendFilter==='UPTREND'&&t!=='uptrend'){pass=false;}
      else if(trendFilter==='DOWNTREND'&&t!=='downtrend'){pass=false;}
      else if(trendFilter==='STABLE'&&t!=='stable'){pass=false;}
      else if(trendFilter==='NOSALE'&&t!=='nosale'){pass=false;}
    }
    if(!pass)continue;
    if(hsFilter){var rP=parseFloat(r[PRICE_R_COL]),wP=parseFloat(r[PRICE_W_COL]);if(isNaN(rP)||isNaN(wP)||rP<=0||wP<=0||rP<wP*1.05){pass=false;}}
    if(!pass)continue;
    if(lpFilter){var rP2=parseFloat(r[PRICE_R_COL]),wP2=parseFloat(r[PRICE_W_COL]);if(isNaN(rP2)||isNaN(wP2)||rP2<=0||wP2<=0||rP2>wP2*0.95){pass=false;}}
    if(!pass)continue;
    for(var f=0;f<exactFilters.length;f++){
      var rv=Number(r[exactFilters[f].col]);
      if(isNaN(rv)||rv!==exactFilters[f].val){pass=false;break;}
    }
    if(!pass)continue;
    for(var f=0;f<textFilters.length;f++){
      if(String(r[textFilters[f].col]||'')!==textFilters[f].val){pass=false;break;}
    }
    if(!pass)continue;
    for(var f=0;f<rangeFilters.length;f++){
      var rf=rangeFilters[f];var rv=Number(r[rf.col]);
      if(isNaN(rv)){pass=false;break;}
      if(rf.op==='above'){if(rv<rf.val){pass=false;break;}}
      else if(rf.op==='below'){if(rv>rf.val){pass=false;break;}}
    }
    if(!pass)continue;
    if(sq){var found=false;for(var j=0;j<r.length;j++){if(String(r[j]||'').toUpperCase().indexOf(sq)>=0){found=true;break;}}if(!found)continue;}
    FILTERED.push(r);
  }
  if(ns){SORT_COL=ns.col;SORT_DIR=ns.dir;}
  if(SORT_COL>=0){FILTERED.sort(function(a,b){var va=a[SORT_COL],vb=b[SORT_COL];var na=parseFloat(va),nb=parseFloat(vb);if(isNaN(na))na=-999999;if(isNaN(nb))nb=-999999;if(!isNaN(parseFloat(va))&&!isNaN(parseFloat(vb)))return(na-nb)*SORT_DIR;va=String(va||'').toUpperCase();vb=String(vb||'').toUpperCase();return va<vb?-1*SORT_DIR:va>vb?1*SORT_DIR:0;});}
  LOADED=0;renderCards();renderCharts();renderTable();
}
function sortBy(col){if(SORT_COL===col){SORT_DIR*=-1;}else{SORT_COL=col;SORT_DIR=1;}applyAll();}
function renderCharts(){
  var ci=getSalesIndexes();var tdy=0,d3=0,d7=0,d15=0,d30=0,d60=0;
  var platMap={},stockMap={},actCount=0,inactCount=0;
  for(var i=0;i<FILTERED.length;i++){var r=FILTERED[i];tdy+=Number(r[ci.today])||0;d3+=Number(r[ci.day3])||0;d7+=Number(r[ci.day7])||0;d15+=Number(r[ci.day15])||0;d30+=Number(r[ci.day30])||0;d60+=Number(r[ci.day60])||0;
    var pl=String(r[1]||'').trim();var st=String(r[STOCK_COL]||'').trim();
    if(pl){if(!platMap[pl])platMap[pl]=0;platMap[pl]+=Number(r[ci.day30])||0;}if(!stockMap[st])stockMap[st]=0;stockMap[st]++;
    if(isActiveValue(r[ACTIVE_COL]))actCount++;else inactCount++;
  }
  dc('ch1');CHS.ch1=new Chart(document.getElementById('ch1'),{type:'bar',data:{labels:['60-Day Avg','30-Day Avg','15-Day Avg','7-Day Avg','3-Day Avg','Today'],datasets:[{data:[Math.round(d60/60),Math.round(d30/30),Math.round(d15/15),Math.round(d7/7),Math.round(d3/3),Math.round(tdy)],backgroundColor:['#f72585','#dc2f02','#a855f7','#e09f3e','#4fc3f7','#39ff14'],borderRadius:5}]},options:bOpts()});
  var sl=[],sv=[],sc=['#39ff14','#dc2f02','#e09f3e','#4fc3f7','#a855f7'];for(var k in stockMap){sl.push(k||'BLANK');sv.push(stockMap[k]);}
  dc('ch2');CHS.ch2=new Chart(document.getElementById('ch2'),{type:'doughnut',data:{labels:sl,datasets:[{data:sv,backgroundColor:sc.slice(0,sl.length),borderWidth:0}]},options:pOpts()});
  var platArr=[];for(var k in platMap)platArr.push({n:k,v:platMap[k]});platArr.sort(function(a,b){return b.v-a.v;});
  var pl2=[],pv=[],pc=['#4fc3f7','#39ff14','#e09f3e','#a855f7','#dc2f02','#f72585','#7209b7','#3a0ca3','#4361ee','#4cc9f0'];
  for(var i=0;i<platArr.length;i++){pl2.push(platArr[i].n);pv.push(platArr[i].v);}
  dc('ch3');CHS.ch3=new Chart(document.getElementById('ch3'),{type:'bar',data:{labels:pl2,datasets:[{data:pv,backgroundColor:pc.slice(0,pl2.length),borderRadius:5}]},options:bOpts()});
  dc('ch4');CHS.ch4=new Chart(document.getElementById('ch4'),{type:'doughnut',data:{labels:['Active','Inactive'],datasets:[{data:[actCount,inactCount],backgroundColor:['#39ff14','#dc2f02'],borderWidth:0}]},options:pOpts()});
}
function bOpts(){return{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#999',font:{size:10}},grid:{color:'#222'}},y:{ticks:{color:'#999',font:{size:10}},grid:{color:'#222'}}}};}
function pOpts(){return{responsive:true,plugins:{legend:{position:'bottom',labels:{color:'#eee',padding:10,font:{size:10}}}}};}
function dc(id){if(CHS[id]){CHS[id].destroy();CHS[id]=null;}}
function renderTable(){
  // Clear tbody and reset loaded counter
  var th='';for(var i=0;i<HEADERS.length;i++){var s=i>=SORTABLE_FROM;var arrow='';if(SORT_COL===i)arrow='<span class="arrow">'+(SORT_DIR===1?'\u25B2':'\u25BC')+'</span>';
    if(s){th+='<th class="sortable" onclick="sortBy('+i+')">'+displayHeader(i)+arrow+'</th>';}else{th+='<th>'+displayHeader(i)+'</th>';}}
  document.getElementById('thead').innerHTML=th;
  document.getElementById('tbody').innerHTML='';
  LOADED=0;
  document.getElementById('ttotal').textContent='Total: '+fmt(FILTERED.length);
  document.getElementById('tcount').textContent='Loading...';
  // Update pagination div with loading indicator
  document.querySelector('.pag').innerHTML='<div style="color:#4fc3f7;font-size:12px">Scroll to load more...</div>';
  loadMoreMainRows();
  // Attach scroll listener to .twrap
  var twrap=document.querySelector('.twrap');
  if(twrap.scrollListener){twrap.removeEventListener('scroll',twrap.scrollListener);}
  twrap.scrollListener=function(){
    if(twrap.scrollTop+twrap.clientHeight>=twrap.scrollHeight-100){
      if(LOADED<FILTERED.length){loadMoreMainRows();}
    }
  };
  twrap.addEventListener('scroll',twrap.scrollListener);
}
function loadMoreMainRows(){
  var start=LOADED;var end=Math.min(LOADED+BATCH_SIZE,FILTERED.length);
  var tb='';
  for(var i=start;i<end;i++){var r=FILTERED[i];var tBg=getTrendBgColor(getTrend(r));
    tb+='<tr'+(tBg?' class="trend-row" style="background:'+tBg+'"':'')+'>';
    for(var j=0;j<r.length;j++){tb+=formatCellValue(r[j],j);}tb+='</tr>';}
  var tbody=document.getElementById('tbody');
  if(start===0)tbody.innerHTML=tb;else tbody.innerHTML+=tb;
  LOADED=end;
  document.getElementById('tcount').textContent='Showing '+(FILTERED.length>0?1:0)+'-'+LOADED+' of '+FILTERED.length;
  // Update pagination div
  if(LOADED>=FILTERED.length){
    document.querySelector('.pag').innerHTML='<div style="color:#999;font-size:12px">All '+fmt(FILTERED.length)+' rows loaded</div>';
  } else {
    document.querySelector('.pag').innerHTML='<div style="color:#4fc3f7;font-size:12px">Loaded '+fmt(LOADED)+' of '+fmt(FILTERED.length)+' • Scroll to load more...</div>';
  }
}
function detectStockInPlatCol(){STOCK_IN_PLAT_COL=-1;for(var i=0;i<HEADERS.length;i++){var h=String(HEADERS[i]||'').trim().toUpperCase();if(h.indexOf('STOCK IN PLAT')>=0||h.indexOf('STOCK_IN_PLAT')>=0||h==='STOCK IN PLATFORM'){STOCK_IN_PLAT_COL=i;break;}}console.log('STOCK_IN_PLAT_COL detected:',STOCK_IN_PLAT_COL,STOCK_IN_PLAT_COL>=0?HEADERS[STOCK_IN_PLAT_COL]:'NOT FOUND');}
function getSalesDivisor(colIdx){
  var ci=getSalesIndexes();
  if(colIdx===ci.today)return 1;
  if(colIdx===ci.day3)return 3;
  if(colIdx===ci.day7)return 7;
  if(colIdx===ci.day15)return 15;
  if(colIdx===ci.day30)return 30;
  if(colIdx===ci.day60)return 60;
  return 0;
}
function displayHeader(i){return HEADERS[i];}
function formatCellValue(val,j){
  var cc='',ct='';
  var divisor=getSalesDivisor(j);
  if(divisor>0){var n=parseFloat(val)||0;ct=String(n);if(n===0){cc=' class="zero"';}return '<td'+cc+'>'+ct+'</td>';}
  if(j===STOCK_COL){var su=String(val||'').trim().toUpperCase();if(su==='IN STOCK'){cc=' style="color:#39ff14;font-weight:700"';ct='IN STOCK';}else{cc=' style="color:#ff4444;font-weight:700"';ct=val||'';}}
  else if(STOCK_IN_PLAT_COL>=0&&j===STOCK_IN_PLAT_COL){var sv=String(val===null||val===undefined?'':val).trim();var n=parseFloat(sv);if(!isNaN(n)&&n>0){cc=' style="color:#39ff14;font-weight:700"';ct=sv;}else{cc=' style="color:#ff4444;font-weight:700"';ct=sv===''?'0':sv;}}
  else if(j===ACTIVE_COL&&(STOCK_IN_PLAT_COL<0||j!==STOCK_IN_PLAT_COL)){ct=isActiveValue(val)?'<span class="badge bg">'+val+'</span>':'<span class="badge br">'+(val===''||val===null||val===undefined?'BLANK':val)+'</span>';}
  else if(RATING_COLS.indexOf(j)>=0){var n=parseFloat(val);if(!isNaN(n)&&n>0){if(n>=4){cc=' style="color:#39ff14;font-weight:700"';}else if(n>=3){cc=' style="color:#e09f3e;font-weight:700"';}else{cc=' style="color:#ff4444;font-weight:700"';}ct=val;}else{ct=(val===null||val===undefined)?'':val;}}
  else if(isUrl(val)){ct=makeLink(val);}
  else if(isRedVal(val,j)){cc=' class="zero"';ct=(val===''||val===null||val===undefined)?'0':val;}
  else{ct=(val===null||val===undefined)?'':val;}
  return '<td'+cc+'>'+ct+'</td>';
}
function isRedVal(val,ci){if(ci>=SORTABLE_FROM){if(val===0||val==='0'||val===''||val===null||val===undefined)return true;}if(RATING_COLS.indexOf(ci)>=0){var n=parseFloat(val);if(!isNaN(n)&&n<3&&n>=0)return true;}return false;}
function isUrl(v){var s=String(v||'').trim();return s.indexOf('http://')===0||s.indexOf('https://')===0||s.indexOf('www.')===0;}
function makeLink(v){var s=String(v||'').trim();var href=s;if(s.indexOf('www.')===0)href='https://'+s;var d=s.replace(/^https?:\/\//,'').replace(/^www\./,'');if(d.length>30)d=d.substring(0,30)+'...';return'<a href="'+href+'" target="_blank" rel="noopener">'+d+'</a>';}
function downloadMainCSV(){
  if(!FILTERED.length){alert('No data!');return;}var csv=[];var hr=[];
  for(var i=0;i<HEADERS.length;i++)hr.push('"'+String(HEADERS[i]||'').replace(/"/g,'""')+'"');csv.push(hr.join(','));
  for(var r=0;r<FILTERED.length;r++){var row=[];for(var c=0;c<FILTERED[r].length;c++){row.push('"'+String(FILTERED[r][c]===null||FILTERED[r][c]===undefined?'':FILTERED[r][c]).replace(/"/g,'""')+'"');}csv.push(row.join(','));}
  var blob=new Blob([csv.join('\n')],{type:'text/csv;charset=utf-8;'});var link=document.createElement('a');link.href=URL.createObjectURL(blob);
  link.download='SKU_WISE_SALES_'+new Date().toISOString().slice(0,10)+'.csv';link.click();URL.revokeObjectURL(link.href);
}
loadData();
</script>
